<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>エムドナルド — バーガー大乱闘！</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Mochiy+Pop+One&display=swap");
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #DA291C;
      font-family: "Noto Sans JP", sans-serif;
      color: #fff;
      overflow-x: hidden;
    }
    .title {
      text-align: center;
      padding: 8px;
      font-family: "Mochiy Pop One", sans-serif;
      font-size: 17px;
      color: #FFC72C;
      text-shadow: 2px 2px 0 #27251F;
    }
    #wrap {
      position: relative;
      width: min(960px, 100vw);
      height: min(640px, calc(100vh - 160px));
      margin: 0 auto;
      border: 6px solid #FFC72C;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 0 #27251F, 0 12px 32px rgba(0,0,0,0.35);
    }
    canvas { display: block; width: 100%; height: 100%; }

    #char-select {
      position: absolute;
      inset: 0;
      z-index: 30;
      background: rgba(39,37,31,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      gap: 12px;
    }
    #char-select h2 {
      font-family: "Mochiy Pop One", sans-serif;
      color: #FFC72C;
      font-size: 18px;
      text-align: center;
    }
    #char-select p { font-size: 12px; color: #F5EBDC; text-align: center; }
    .char-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 380px;
      width: 100%;
    }
    .char-btn {
      font-family: "Mochiy Pop One", sans-serif;
      font-size: 12px;
      padding: 14px 8px;
      border: 3px solid #27251F;
      border-radius: 12px;
      cursor: pointer;
      background: #F5EBDC;
      color: #27251F;
      box-shadow: 0 4px 0 #27251F;
      transition: transform 0.1s;
    }
    .char-btn:hover { filter: brightness(1.05); }
    .char-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #27251F; }
    .char-btn .emoji { font-size: 28px; display: block; margin-bottom: 4px; }
    #char-select.hidden { display: none; }

    #meta {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 8px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), transparent);
      z-index: 5;
      pointer-events: none;
      font-size: 11px;
      color: #2d3436;
    }
    #meta .row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
    #player-label { color: #DA291C; font-weight: 900; }
    #player-hp { color: #e74c3c; font-weight: 900; }
    #combo { color: #FF6B9D; font-weight: 900; }
    #score { color: #06C167; font-weight: 900; }

    #bot-count { color: #636e72; font-weight: 900; }

    #fight-hint {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      font-size: 11px;
      color: #27251F;
      background: rgba(255,199,44,0.9);
      padding: 4px 12px;
      border-radius: 999px;
      border: 2px solid #27251F;
      pointer-events: none;
      font-weight: 700;
    }
    #speech-bubble {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 90%;
      background: #fff;
      color: #222;
      border: 3px solid #DA291C;
      border-radius: 16px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      z-index: 8;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #speech-bubble.show { opacity: 1; }

    #game-over {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(39,37,31,0.88);
      gap: 12px;
    }
    #game-over.show { display: flex; }
    #game-over .go-title {
      font-family: "Mochiy Pop One", sans-serif;
      font-size: clamp(36px, 8vw, 64px);
      color: #FFC72C;
      text-shadow: 4px 4px 0 #27251F, 0 0 24px rgba(255,199,44,0.6);
      animation: winPulse 0.8s ease-in-out infinite alternate;
    }
    #game-over.lose .go-title { color: #ff7675; text-shadow: 4px 4px 0 #27251F; animation: none; }
    @keyframes winPulse {
      from { transform: scale(1); }
      to { transform: scale(1.06); }
    }
    #game-over p { color: #F5EBDC; font-size: 14px; text-align: center; max-width: 320px; }
    #game-over button {
      font-family: "Mochiy Pop One", sans-serif;
      font-size: 14px;
      padding: 12px 24px;
      border: 3px solid #27251F;
      border-radius: 12px;
      cursor: pointer;
      background: #FFC72C;
      color: #27251F;
      box-shadow: 0 4px 0 #27251F;
    }

    #habit-panel, #controls {
      width: min(960px, 100vw);
      margin: 6px auto;
    }
    #habit-panel {
      padding: 8px 12px;
      background: #F5EBDC;
      border: 3px solid #FFC72C;
      border-radius: 4px;
      font-size: 12px;
      color: #27251F;
    }
    #habit-panel h3 {
      font-family: "Mochiy Pop One", sans-serif;
      color: #DA291C;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .habit-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
    .habit-stat {
      background: #fff;
      padding: 6px;
      border-radius: 6px;
      text-align: center;
      border: 1px solid #ffeaa7;
      font-size: 11px;
    }
    .habit-stat b { display: block; font-size: 18px; color: #FFC72C; }

    #controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    button.ctrl {
      font-family: "Mochiy Pop One", sans-serif;
      font-size: 12px;
      padding: 8px 14px;
      border: 3px solid #27251F;
      border-radius: 8px;
      cursor: pointer;
      background: #FFC72C;
      color: #27251F;
      box-shadow: 0 4px 0 #27251F;
    }
    button.ctrl:active { transform: translateY(3px); box-shadow: 0 1px 0 #27251F; }
    button.ctrl.off { background: #636e72; color: #ccc; }

    #uber-optional {
      width: min(960px, 100vw);
      margin: 6px auto 14px;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.85);
    }
    #uber-optional a {
      color: #FFC72C;
      text-decoration: underline;
    }

    .fx {
      position: absolute;
      pointer-events: none;
      z-index: 15;
      font-family: "Mochiy Pop One", sans-serif;
      animation: fxUp 0.7s ease-out forwards;
      text-shadow: 2px 2px 0 #000;
    }
    @keyframes fxUp {
      0% { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
      100% { transform: translate(-50%,-120%) scale(1.2); opacity: 0; }
    }
    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #DA291C;
      color: #fff;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 900;
      z-index: 100;
      border: 3px solid #FFC72C;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="title">🍔 エムドナルド — 店内バトル 🍔</div>

  <div id="wrap">
    <div id="char-select">
      <h2>誰になって戦う？</h2>
      <p>キッチン側：かわいい店員＆イケメン店員<br>客席側：Uber配達＆お客さん（300円投げ）<br>店員2人を倒したら <b>YOU WIN</b>！</p>
      <div class="char-grid" id="char-grid"></div>
    </div>
    <div id="meta">
      <div class="row">
        <span id="player-label">キャラ選択中…</span>
        <span id="player-hp">HP ████████ 100</span>
        <span id="combo">COMBO x0</span>
        <span id="bot-count">残り 0人</span>
        <span id="score">店員撃破 0/2</span>
      </div>
    </div>
    <div id="fight-hint">長押し連射！黒カウンターの向こうの店員を倒せ</div>
    <div id="speech-bubble"></div>
    <div id="game-over">
      <div class="go-title" id="go-title">YOU WIN!</div>
      <p id="go-msg">店員全員を倒した！</p>
      <button type="button" id="btn-retry">もう一度</button>
    </div>
    <canvas id="canvas"></canvas>
  </div>

  <div id="habit-panel">
    <h3>📊 バトル記録</h3>
    <div class="habit-grid">
      <div class="habit-stat">総ヒット<b id="st-total">0</b></div>
      <div class="habit-stat">連続プレイ<b id="st-days">0</b>日</div>
      <div class="habit-stat">今日<b id="st-today">0</b>回</div>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl" id="btn-sound">🔊 音声 ON</button>
    <button class="ctrl" id="btn-change">🔄 キャラ変更</button>
  </div>

  <p id="uber-optional">
    ゲームを楽しんで、配達で稼ぎたくなったら →
    <a id="uber-link" href="https://www.uber.com/signup/drive/deliver/?invite_code=zzzxa28" target="_blank" rel="noopener noreferrer">Uber Eats 配達パートナー登録</a>
    （招待コード zzzxa28）
  </p>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script>
    const { Engine, Render, Runner, Bodies, Body, Composite, Events, Vector } = Matter;

    const W = 960, H = 640;
    const COUNTER_Y = H * 0.48;
    const KITCHEN_Y = COUNTER_Y - 72;
    const FLOOR_Y = COUNTER_Y + 88;
    const MAX_DRIFT = 45;
    const MAX_SPEED = 2.8;
    const wrap = document.getElementById("wrap");
    const canvas = document.getElementById("canvas");
    const bubble = document.getElementById("speech-bubble");
    canvas.width = W; canvas.height = H;

    const MC = { red: "#DA291C", yellow: "#FFC72C", cream: "#F5EBDC", brown: "#27251F" };
    const UBER_SIGNUP_URL = "https://www.uber.com/signup/drive/deliver/?invite_code=zzzxa28";

    const MAX_HP = 100;
    const CLERK_HP = 130;
    const DAMAGE = { burger: 15, coin: 13, bag: 12 };
    const CLERK_IDS = ["yui", "takuya"];

    const ROSTER = [
      {
        id: "yui", name: "ゆい", emoji: "👧", role: "cute-clerk", side: "kitchen",
        x: 0.38, y: KITCHEN_Y / H,
        hp: CLERK_HP, isClerk: true,
        skin: "#f5c89a", hair: "#3d2314",
        voice: { pitch: 1.45, rate: 1.1 },
        lines: {
          throw: ["バーガーどうぞ！", "いっけー！", "当てちゃう！", "注文お待たせ！"],
          hit: ["きゃっ！", "痛い…！", "まだ立つ！", "負けないもん！"],
          idle: ["いらっしゃいませ〜♪", "今日も可愛く！", "エムドナルド！", "バンッ！"],
          fall: ["うわぁ…", "店長ー助けて…"],
        },
      },
      {
        id: "takuya", name: "タクヤ", emoji: "😎", role: "handsome", side: "kitchen",
        x: 0.62, y: KITCHEN_Y / H,
        hp: CLERK_HP, isClerk: true,
        skin: "#e8b88a", hair: "#1a1a1a",
        voice: { pitch: 0.82, rate: 1.0 },
        lines: {
          throw: ["イケメン直球！", "見てろ！", "決めた！", "これがプロ！"],
          hit: ["…まあいい", "ナイスショット", "まだ余裕", "強いな…"],
          idle: ["イケメン店員", "モテるレジ", "タクヤです", "スマイルで"],
          fall: ["くっ…！", "負けた…"],
        },
      },
      {
        id: "ken", name: "ケン", emoji: "🛵", role: "courier", side: "floor",
        x: 0.28, y: FLOOR_Y / H,
        hp: MAX_HP, isClerk: false,
        skin: "#d4a574", hair: "#111",
        voice: { pitch: 0.95, rate: 1.0 },
        lines: {
          throw: ["配達投げ！", "Uber Eats！", "届ける！", "ケン行く！"],
          hit: ["うわ！", "ボロ袋！", "おっと！", "まだ届ける！"],
          idle: ["zzz…", "眠い…", "あと5分…", "休憩…"],
          fall: ["配達中断…", "倒れた…"],
        },
      },
      {
        id: "customer", name: "客・田中", emoji: "🧑", role: "customer", side: "floor",
        x: 0.72, y: FLOOR_Y / H,
        hp: MAX_HP, isClerk: false,
        skin: "#e0b080", hair: "#4a3728",
        voice: { pitch: 1.0, rate: 1.05 },
        lines: {
          throw: ["300円！", "はいどうぞ！", "お釣りない！", "コイン投げ！"],
          hit: ["痛い！", "なにこれ！", "店長ー！", "もう！"],
          idle: ["バーガーください", "300円持ってる", "待ってる", "お腹空いた"],
          fall: ["財布…", "倒れた…"],
        },
      },
    ];

    let playerId = null;
    let playerHits = 0;
    let combo = 0;
    let comboTimer = null;
    let gameResult = null;
    let soundOn = true;
    let audioCtx = null;
    let playerThrowReady = true;
    let holdingFire = false;
    let holdFireTimer = null;
    let lastAim = { x: W / 2, y: H / 2 };
    let screenShake = 0;
    let kenSleeping = false;
    let kenSleepUntil = 0;
    let kenWakeAt = 0;
    let counterBounce = 0;
    const particles = [];
    const botThrowReady = new Map();
    const projectiles = new Set();
    const hitCooldown = new Map();
    const hpMap = Object.fromEntries(ROSTER.map(r => [r.id, r.hp || MAX_HP]));
    const defeated = new Set();
    const animState = Object.fromEntries(ROSTER.map(r => [r.id, { windUp: 0, defeatT: 0 }]));

    const SAVE_KEY = "emudonald_habit_v3";
    let habit = loadHabit();
    function loadHabit() {
      try {
        const d = JSON.parse(localStorage.getItem(SAVE_KEY) || "{}");
        const today = new Date().toDateString();
        if (d.lastDate !== today) {
          if (d.lastDate === new Date(Date.now() - 86400000).toDateString()) d.streak = (d.streak || 0) + 1;
          else d.streak = 1;
          d.todayHits = 0;
          d.lastDate = today;
        }
        return { total: d.total || 0, streak: d.streak || 1, todayHits: d.todayHits || 0, lastDate: d.lastDate || today };
      } catch { return { total: 0, streak: 1, todayHits: 0, lastDate: new Date().toDateString() }; }
    }
    function saveHabit() {
      localStorage.setItem(SAVE_KEY, JSON.stringify(habit));
      updateUI();
    }
    function hpBar(n, max) {
      const filled = Math.max(0, Math.ceil((n / max) * 8));
      return "█".repeat(filled) + "░".repeat(8 - filled);
    }
    function updateUI() {
      document.getElementById("st-total").textContent = habit.total;
      document.getElementById("st-days").textContent = habit.streak;
      document.getElementById("st-today").textContent = habit.todayHits;
      document.getElementById("combo").textContent = "COMBO x" + combo;
      const p = ROSTER.find(r => r.id === playerId);
      const php = playerId ? hpMap[playerId] : MAX_HP;
      const pmax = p?.hp || MAX_HP;
      document.getElementById("player-hp").textContent = playerId
        ? `HP ${hpBar(php, pmax)} ${Math.max(0, Math.ceil(php))}`
        : "";
      document.getElementById("player-label").textContent = p
        ? `${p.emoji} ${p.name}`
        : "キャラを選んでね";
      const alive = playerId ? ROSTER.filter(r => r.id !== playerId && !defeated.has(r.id)).length : 0;
      document.getElementById("bot-count").textContent = playerId ? `残り ${alive}人` : "";
      const clerksDown = enemyClerks().filter(id => defeated.has(id)).length;
      const clerksTotal = playerId ? enemyClerks().length : 2;
      document.getElementById("score").textContent = playerId
        ? `店員撃破 ${clerksDown}/${clerksTotal}`
        : "店員撃破 0/2";
    }
    updateUI();

    // ── キャラ選択 ──
    const charGrid = document.getElementById("char-grid");
    ROSTER.forEach(r => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "char-btn";
      btn.innerHTML = `<span class="emoji">${r.emoji}</span>${r.name}`;
      btn.onclick = () => startAs(r.id);
      charGrid.appendChild(btn);
    });

    function resetBattle() {
      gameResult = null;
      playerHits = 0;
      combo = 0;
      defeated.clear();
      projectiles.clear();
      hitCooldown.clear();
      particles.length = 0;
      screenShake = 0;
      counterBounce = 0;
      kenSleeping = false;
      kenSleepUntil = Date.now() + 4000 + Math.random() * 3000;
      document.getElementById("game-over").classList.remove("show", "lose");
      ROSTER.forEach(r => {
        hpMap[r.id] = r.hp || MAX_HP;
        animState[r.id] = { windUp: 0, defeatT: 0 };
        botThrowReady.set(r.id, 0);
        const body = getFighterBody(r.id);
        if (body) {
          Body.setStatic(body, false);
          Body.setPosition(body, { x: r.x * W, y: r.y * H });
          Body.setVelocity(body, { x: 0, y: 0 });
          Body.setAngle(body, 0);
          body.plugin.ax = r.x * W;
          body.plugin.ay = r.y * H;
        }
      });
      Composite.allBodies(world).forEach(b => {
        if (b.label === "projectile") Composite.remove(world, b);
      });
      updateUI();
    }

    function startAs(id) {
      playerId = id;
      resetBattle();
      document.getElementById("char-select").classList.add("hidden");
      updateUI();
      ensureAudio();
      const p = ROSTER.find(r => r.id === id);
      const proj = p.role === "customer" ? "300円コイン" : "バーガー";
      showToast(`${p.emoji} ${p.name} — ${proj}で店員を倒せ！`);
      speak(p, "店員を倒して YOU WIN！がんばれ！");
      ROSTER.forEach(r => {
        if (r.id !== id) botThrowReady.set(r.id, Date.now() + 800 + Math.random() * 600);
      });
    }

    function endGame(result) {
      if (gameResult) return;
      gameResult = result;
      holdingFire = false;
      clearInterval(holdFireTimer);
      const overlay = document.getElementById("game-over");
      const title = document.getElementById("go-title");
      const msg = document.getElementById("go-msg");
      overlay.classList.add("show");
      if (result === "win") {
        title.textContent = "YOU WIN!";
        msg.textContent = "カウンター向こうの店員2人を倒した！YOU WIN！";
        overlay.classList.remove("lose");
        sfx("win");
      } else {
        title.textContent = "YOU LOSE";
        msg.textContent = "倒されてしまった…もう一度挑戦しよう！";
        overlay.classList.add("lose");
        sfx("lose");
      }
    }

    document.getElementById("btn-retry").onclick = () => {
      if (playerId) startAs(playerId);
    };

    document.getElementById("btn-change").onclick = () => {
      document.getElementById("char-select").classList.remove("hidden");
      document.getElementById("game-over").classList.remove("show", "lose");
      playerId = null;
      gameResult = null;
      resetBattle();
      updateUI();
    };

    // ── 音声 ──
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }
    function sfx(type) {
      if (!soundOn || !audioCtx) return;
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      if (type === "throw") {
        osc.type = "square";
        osc.frequency.setValueAtTime(200, t);
        osc.frequency.exponentialRampToValueAtTime(90, t + 0.1);
        gain.gain.setValueAtTime(0.12, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        osc.start(t); osc.stop(t + 0.1);
      } else if (type === "hit") {
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(100, t);
        osc.frequency.exponentialRampToValueAtTime(35, t + 0.18);
        gain.gain.setValueAtTime(0.18, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.18);
        osc.start(t); osc.stop(t + 0.18);
      } else if (type === "combo") {
        osc.type = "sine";
        osc.frequency.setValueAtTime(440, t);
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
        osc.start(t); osc.stop(t + 0.12);
      } else if (type === "win") {
        const notes = [523, 659, 784, 1047, 784, 1047];
        notes.forEach((f, i) => {
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g); g.connect(audioCtx.destination);
          o.type = i < 4 ? "triangle" : "sine";
          o.frequency.setValueAtTime(f, t + i * 0.14);
          g.gain.setValueAtTime(0.18, t + i * 0.14);
          g.gain.exponentialRampToValueAtTime(0.01, t + i * 0.14 + 0.35);
          o.start(t + i * 0.14); o.stop(t + i * 0.14 + 0.35);
        });
      } else if (type === "defeat") {
        osc.type = "square";
        osc.frequency.setValueAtTime(220, t);
        osc.frequency.exponentialRampToValueAtTime(80, t + 0.35);
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.35);
        osc.start(t); osc.stop(t + 0.35);
      } else if (type === "sleep") {
        osc.type = "sine";
        osc.frequency.setValueAtTime(330, t);
        gain.gain.setValueAtTime(0.04, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
        osc.start(t); osc.stop(t + 0.3);
      } else if (type === "grab") {
        [600, 750].forEach((f, i) => {
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g); g.connect(audioCtx.destination);
          o.frequency.setValueAtTime(f, t + i * 0.05);
          g.gain.setValueAtTime(0.06, t + i * 0.05);
          g.gain.exponentialRampToValueAtTime(0.01, t + i * 0.05 + 0.08);
          o.start(t + i * 0.05); o.stop(t + i * 0.05 + 0.08);
        });
      } else if (type === "lose") {
        osc.type = "triangle";
        osc.frequency.setValueAtTime(180, t);
        osc.frequency.exponentialRampToValueAtTime(60, t + 0.5);
        gain.gain.setValueAtTime(0.15, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
        osc.start(t); osc.stop(t + 0.5);
      } else if (type === "coin") {
        osc.type = "sine";
        osc.frequency.setValueAtTime(880, t);
        gain.gain.setValueAtTime(0.08, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.06);
        osc.start(t); osc.stop(t + 0.06);
      }
    }
    function speak(fighter, line) {
      if (!soundOn || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(line);
      u.lang = "ja-JP";
      u.pitch = fighter.voice.pitch;
      u.rate = fighter.voice.rate;
      bubble.textContent = `${fighter.name}: ${line}`;
      bubble.classList.add("show");
      clearTimeout(bubble._t);
      bubble._t = setTimeout(() => bubble.classList.remove("show"), 2200);
      window.speechSynthesis.speak(u);
    }
    function randomLine(f, kind) {
      const arr = f.lines[kind];
      return arr[Math.floor(Math.random() * arr.length)];
    }
    document.getElementById("btn-sound").onclick = function () {
      ensureAudio();
      soundOn = !soundOn;
      this.textContent = soundOn ? "🔊 音声 ON" : "🔇 音声 OFF";
      this.classList.toggle("off", !soundOn);
    };
    function showToast(msg) {
      const t = document.createElement("div");
      t.className = "toast";
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }
    function showFx(x, y, text, color = MC.yellow) {
      const el = document.createElement("div");
      el.className = "fx";
      el.textContent = text;
      el.style.color = color;
      el.style.left = (x / W * wrap.clientWidth) + "px";
      el.style.top = (y / H * wrap.clientHeight) + "px";
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 700);
    }

    // ── Matter.js ──
    const engine = Engine.create({ gravity: { x: 0, y: 0.22 } });
    const world = engine.world;
    const render = Render.create({
      canvas, engine,
      options: { width: W, height: H, wireframes: false, background: MC.cream },
    });

    function drawGoldenArches(ctx, cx, cy, size) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.strokeStyle = MC.yellow;
      ctx.lineWidth = size * 0.2;
      ctx.lineCap = "round";
      const r = size * 0.38;
      ctx.beginPath(); ctx.arc(-r * 0.52, r * 0.35, r, Math.PI, 0); ctx.stroke();
      ctx.beginPath(); ctx.arc(r * 0.52, r * 0.35, r, Math.PI, 0); ctx.stroke();
      ctx.restore();
    }

    function projectileTypeFor(role) {
      if (role === "customer") return "coin";
      if (role === "courier") return "bag";
      return "burger";
    }

    function spawnParticles(x, y, color, n = 8) {
      for (let i = 0; i < n; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 8,
          vy: (Math.random() - 0.5) * 8 - 2,
          life: 1,
          color,
          size: 2 + Math.random() * 4,
        });
      }
    }

    function drawStore(ctx) {
      const shakeX = screenShake ? (Math.random() - 0.5) * screenShake : 0;
      const shakeY = screenShake ? (Math.random() - 0.5) * screenShake : 0;
      ctx.save();
      ctx.translate(shakeX, shakeY);

      ctx.fillStyle = MC.cream;
      ctx.fillRect(0, 0, W, H);

      // ── キッチン側（カウンターより上）──
      const kg = ctx.createLinearGradient(0, 0, 0, COUNTER_Y);
      kg.addColorStop(0, "#2c3e50");
      kg.addColorStop(0.5, "#4a5568");
      kg.addColorStop(1, "#718096");
      ctx.fillStyle = kg;
      ctx.fillRect(0, 60, W, COUNTER_Y - 60);

      // 換気口・厨房設備
      ctx.fillStyle = "#1a202c";
      ctx.fillRect(60, 70, 120, 40);
      ctx.fillRect(W - 180, 70, 120, 40);
      ctx.fillStyle = "#a0aec0";
      ctx.font = "9px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("KITCHEN", W / 2, 95);

      // ヒートランプ
      for (let i = 0; i < 4; i++) {
        const hx = 180 + i * 160;
        ctx.fillStyle = "#333";
        ctx.fillRect(hx - 30, 110, 60, 8);
        ctx.fillStyle = "rgba(255,199,44,0.5)";
        ctx.beginPath();
        ctx.ellipse(hx, 130, 28, 12, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // フライヤー（シルエット）
      ctx.fillStyle = "#2d3748";
      ctx.fillRect(40, COUNTER_Y - 55, 50, 45);
      ctx.fillStyle = MC.yellow;
      ctx.fillRect(48, COUNTER_Y - 48, 34, 6);

      // ── 客席側（カウンターより下）──
      ctx.fillStyle = MC.red;
      ctx.fillRect(0, COUNTER_Y + 20, W, H - COUNTER_Y - 20);
      const tile = 36;
      for (let y = COUNTER_Y + 40; y < H; y += tile) {
        for (let x = 0; x < W; x += tile) {
          ctx.fillStyle = ((x / tile | 0) + (y / tile | 0)) % 2 ? MC.cream : "#E8D5C4";
          ctx.fillRect(x, y, tile, tile);
        }
      }

      // 天井
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, W, 60);
      for (let i = 0; i < 6; i++) {
        ctx.fillStyle = "rgba(255,199,44,0.3)";
        ctx.beginPath();
        ctx.ellipse(80 + i * 150, 40, 36, 12, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // 看板
      ctx.fillStyle = MC.red;
      ctx.strokeStyle = MC.yellow;
      ctx.lineWidth = 3;
      ctx.fillRect(W / 2 - 90, 8, 180, 48);
      ctx.strokeRect(W / 2 - 90, 8, 180, 48);
      drawGoldenArches(ctx, W / 2, 28, 38);
      ctx.fillStyle = MC.yellow;
      ctx.font = "bold 12px 'Noto Sans JP'";
      ctx.fillText("エムドナルド", W / 2, 50);

      // ── 黒カウンター（キッチンと客席の仕切り）──
      const cw = W * 0.82;
      const cx = (W - cw) / 2;
      const cy = COUNTER_Y + counterBounce;
      const ch = 22;

      // カウンター本体（黒・厚みあり）
      const counterGrad = ctx.createLinearGradient(0, cy - 30, 0, cy + 10);
      counterGrad.addColorStop(0, "#2a2a2a");
      counterGrad.addColorStop(0.5, "#111");
      counterGrad.addColorStop(1, "#000");
      ctx.fillStyle = counterGrad;
      ctx.fillRect(cx, cy - ch / 2 - 8, cw, ch + 8);
      ctx.fillStyle = "#0a0a0a";
      ctx.fillRect(cx, cy + ch / 2, cw, 6);

      // カウンター上面（商品置き場）
      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect(cx, cy - ch / 2 - 12, cw, 8);
      ctx.strokeStyle = "#444";
      ctx.lineWidth = 1;
      ctx.strokeRect(cx, cy - ch / 2 - 12, cw, 8);

      // ★ 商品（カウンター上）
      const products = [
        { x: cx + 80, type: "burger" },
        { x: cx + 180, type: "fries" },
        { x: cx + cw - 180, type: "burger" },
        { x: cx + cw - 80, type: "drink" },
      ];
      products.forEach(p => drawCounterProduct(ctx, p.x, cy - ch / 2 - 18, p.type));

      // レジ
      ctx.fillStyle = "#333";
      ctx.fillRect(W / 2 - 32, cy - 38, 64, 26);
      ctx.fillStyle = MC.yellow;
      ctx.font = "8px 'Noto Sans JP'";
      ctx.fillText("REGISTER", W / 2, cy - 22);

      // エリアラベル
      ctx.fillStyle = "rgba(255,255,255,0.75)";
      ctx.font = "bold 10px 'Noto Sans JP'";
      ctx.fillText("▲ キッチン側（店員）", W / 2, KITCHEN_Y - 20);
      ctx.fillStyle = "rgba(39,37,31,0.7)";
      ctx.fillText("▼ 客席側（お客・配達）", W / 2, FLOOR_Y + 30);

      ctx.restore();
    }

    function drawCounterProduct(ctx, x, y, type) {
      if (type === "burger") {
        ctx.fillStyle = "#8B4513";
        ctx.fillRect(x - 14, y - 4, 28, 8);
        ctx.fillStyle = "#f39c12";
        ctx.fillRect(x - 12, y - 8, 24, 5);
        ctx.fillStyle = "#27ae60";
        ctx.fillRect(x - 10, y - 11, 20, 3);
      } else if (type === "fries") {
        ctx.fillStyle = MC.red;
        ctx.fillRect(x - 10, y - 14, 20, 16);
        ctx.fillStyle = MC.yellow;
        for (let i = 0; i < 5; i++) {
          ctx.fillRect(x - 8 + i * 3, y - 20 - (i % 2) * 3, 2, 8);
        }
      } else {
        ctx.fillStyle = MC.red;
        ctx.fillRect(x - 8, y - 16, 16, 18);
        ctx.fillStyle = "#fff";
        ctx.fillRect(x - 6, y - 14, 12, 4);
      }
    }

    Events.on(render, "beforeRender", () => drawStore(render.context));

    Composite.add(world, [
      Bodies.rectangle(W/2, -20, W, 40, { isStatic: true, render: { visible: false } }),
      Bodies.rectangle(W/2, H + 20, W, 40, { isStatic: true, render: { visible: false } }),
      Bodies.rectangle(-20, H/2, 40, H, { isStatic: true, render: { visible: false } }),
      Bodies.rectangle(W + 20, H/2, 40, H, { isStatic: true, render: { visible: false } }),
      Bodies.rectangle(W/2, COUNTER_Y, W * 0.82, 24, { isStatic: true, render: { visible: false } }),
    ]);

    const fighters = ROSTER.map(r => {
      const body = Bodies.circle(r.x * W, r.y * H, 36, {
        label: "fighter",
        restitution: 0.1,
        frictionAir: 0.45,
        render: { visible: false },
        plugin: { ...r, ax: r.x * W, ay: r.y * H },
      });
      return body;
    });
    Composite.add(world, fighters);

    function fighterBounds(side) {
      if (side === "kitchen") {
        return { minX: 100, maxX: W - 100, minY: 130, maxY: COUNTER_Y - 36 };
      }
      return { minX: 80, maxX: W - 80, minY: COUNTER_Y + 36, maxY: H - 70 };
    }

    function constrainFighter(f) {
      const { side, ax, ay, id } = f.plugin;
      const b = fighterBounds(side);
      let { x, y } = f.position;
      let { x: vx, y: vy } = f.velocity;

      // ホーム位置から離れすぎない
      const dx = x - ax, dy = y - ay;
      const dist = Math.hypot(dx, dy);
      if (dist > MAX_DRIFT && !defeated.has(id)) {
        x = ax + dx * (MAX_DRIFT / dist);
        y = ay + dy * (MAX_DRIFT / dist);
        vx *= 0.5;
        vy *= 0.5;
      }

      // エリア内にクランプ
      x = Math.max(b.minX, Math.min(b.maxX, x));
      y = Math.max(b.minY, Math.min(b.maxY, y));

      if (x !== f.position.x || y !== f.position.y) {
        Body.setPosition(f, { x, y });
      }

      // 速度上限
      const spd = Math.hypot(vx, vy);
      if (spd > MAX_SPEED) {
        vx = (vx / spd) * MAX_SPEED;
        vy = (vy / spd) * MAX_SPEED;
        Body.setVelocity(f, { x: vx, y: vy });
      }
    }

    function nudgeFighter(f, nx, ny) {
      if (defeated.has(f.plugin.id)) return;
      const { ax, ay } = f.plugin;
      Body.setPosition(f, {
        x: ax + Math.max(-MAX_DRIFT, Math.min(MAX_DRIFT, f.position.x - ax + nx)),
        y: ay + Math.max(-MAX_DRIFT, Math.min(MAX_DRIFT, f.position.y - ay + ny)),
      });
      Body.setVelocity(f, { x: 0, y: 0 });
    }

    function getFighterBody(id) {
      return fighters.find(f => f.plugin.id === id);
    }

    function spawnProjectile(shooterBody, tx, ty, opts = {}) {
      if (gameResult || defeated.has(shooterBody.plugin.id)) return;
      const shooter = shooterBody.plugin;
      const sid = shooter.id;
      const ptype = projectileTypeFor(shooter.role);

      if (ptype === "coin") {
        animState[sid].windUp = 1;
        if (sid === playerId) sfx("grab");
      }

      const from = shooterBody.position;
      const dir = Vector.normalise(Vector.sub({ x: tx, y: ty }, from));
      const speed = ptype === "coin" ? 26 : opts.fast ? 23 : 21;
      const radius = ptype === "coin" ? 12 : 14;
      const proj = Bodies.circle(from.x, from.y - 30, radius, {
        label: "projectile",
        restitution: 0.92,
        frictionAir: 0.008,
        render: { visible: false },
        plugin: { shooterId: sid, ptype, fromBot: sid !== playerId },
      });
      Body.setVelocity(proj, { x: dir.x * speed, y: dir.y * speed });
      Body.setAngularVelocity(proj, (Math.random() - 0.5) * 0.35);
      Composite.add(world, proj);
      projectiles.add(proj);

      // 攻撃時は小さくよける（飛ばない）
      for (const f of fighters) {
        if (f.id === shooterBody.id || defeated.has(f.plugin.id)) continue;
        nudgeFighter(f, (Math.random() - 0.5) * 14, (Math.random() - 0.5) * 10);
      }
      counterBounce = 3;

      if (sid === playerId || !opts.quiet) sfx(ptype === "coin" ? "coin" : "throw");
      if (sid === playerId) speak(shooter, randomLine(shooter, "throw"));
      const fxText = ptype === "coin" ? "300円！" : sid === playerId ? "バンッ！" : "！";
      showFx(from.x, from.y, fxText, ptype === "coin" ? "#f1c40f" : ptype === "bag" ? "#06C167" : MC.yellow);
      setTimeout(() => {
        if (projectiles.has(proj)) { Composite.remove(world, proj); projectiles.delete(proj); }
      }, 3200);
    }

    function playerThrow(tx, ty) {
      if (!playerId || !playerThrowReady || gameResult) return;
      const player = getFighterBody(playerId);
      if (!player || defeated.has(playerId)) return;
      playerThrowReady = false;
      spawnProjectile(player, tx, ty, { fast: holdingFire });
      setTimeout(() => { playerThrowReady = true; }, holdingFire ? 100 : 180);
    }

    function pickBotTarget(shooterBody) {
      const player = getFighterBody(playerId);
      if (player && !defeated.has(playerId) && Math.random() < 0.75) return player;
      const others = fighters.filter(f =>
        f.plugin.id !== shooterBody.plugin.id && !defeated.has(f.plugin.id)
      );
      if (!others.length) return null;
      return others[Math.floor(Math.random() * others.length)];
    }

    function runBotAI() {
      if (!playerId || gameResult) return;
      const now = Date.now();

      // ケンの居眠りサイクル
      if (now > kenSleepUntil && !kenSleeping) {
        kenSleeping = true;
        kenWakeAt = now + 3000 + Math.random() * 4000;
        sfx("sleep");
        const ken = ROSTER.find(r => r.id === "ken");
        if (ken && !defeated.has("ken")) speak(ken, "zzz…眠い…");
      }
      if (kenSleeping && now > kenWakeAt) {
        kenSleeping = false;
        kenSleepUntil = now + 5000 + Math.random() * 6000;
      }

      for (const bot of fighters.filter(f => f.plugin.id !== playerId && !defeated.has(f.plugin.id))) {
        const id = bot.plugin.id;
        if (id === "ken" && kenSleeping) continue;
        const next = botThrowReady.get(id) || 0;
        if (now < next) continue;
        const target = pickBotTarget(bot);
        if (!target) continue;
        const spread = target.plugin.id === playerId ? 20 : 38;
        spawnProjectile(
          bot,
          target.position.x + (Math.random() - 0.5) * spread,
          target.position.y + (Math.random() - 0.5) * spread,
          { quiet: true }
        );
        const isClerk = bot.plugin.isClerk;
        botThrowReady.set(id, now + (isClerk ? 550 : 850) + Math.random() * (isClerk ? 650 : 950));
      }
    }

    function enemyClerks() {
      return CLERK_IDS.filter(id => id !== playerId);
    }

    function checkWin() {
      if (enemyClerks().every(id => defeated.has(id))) {
        setTimeout(() => endGame("win"), 800);
      }
    }

    function knockDown(victimBody) {
      const id = victimBody.plugin.id;
      if (defeated.has(id)) return;
      defeated.add(id);
      animState[id].defeatT = 1;
      sfx("defeat");
      speak(victimBody.plugin, randomLine(victimBody.plugin, "fall"));
      Body.setPosition(victimBody, { x: victimBody.plugin.ax, y: victimBody.plugin.ay });
      Body.setVelocity(victimBody, { x: 0, y: 0 });
      Body.setAngularVelocity(victimBody, 0);
      screenShake = 8;
      showFx(victimBody.position.x, victimBody.position.y, "K.O.!", "#e74c3c");
      spawnParticles(victimBody.position.x, victimBody.position.y, "#e74c3c", 12);
      if (victimBody.plugin.isClerk) {
        showToast(`💥 ${victimBody.plugin.name} 撃破！`);
      }
      updateUI();
      if (id === playerId) {
        setTimeout(() => endGame("lose"), 800);
        return;
      }
      checkWin();
    }

    Events.on(engine, "collisionStart", ({ pairs }) => {
      for (const { bodyA: a, bodyB: b } of pairs) {
        const proj = [a, b].find(x => x.label === "projectile");
        const victim = [a, b].find(x => x.label === "fighter");
        if (!proj || !victim) continue;
        if (proj.plugin.shooterId === victim.plugin.id) continue;
        if (defeated.has(victim.plugin.id)) continue;
        const key = proj.id + "-" + victim.id;
        if (hitCooldown.has(key)) continue;
        hitCooldown.set(key, true);
        setTimeout(() => hitCooldown.delete(key), 180);

        const dmg = DAMAGE[proj.plugin.ptype] || 12;
        hpMap[victim.plugin.id] -= dmg;

        if (proj.plugin.shooterId === playerId) {
          playerHits++;
          combo++;
          clearTimeout(comboTimer);
          comboTimer = setTimeout(() => { combo = 0; updateUI(); }, 1800);
          if (combo >= 3) sfx("combo");
          if (victim.plugin.isClerk) {
            showFx(victim.position.x, victim.position.y - 30, combo > 2 ? `COMBO! -${dmg}` : `-${dmg}`, MC.yellow);
          }
        }
        if (victim.plugin.id === playerId) {
          showToast(`${ROSTER.find(r => r.id === proj.plugin.shooterId)?.name || "店員"}の攻撃！ -${dmg}`);
          if (hpMap[playerId] < 30) showToast("⚡ ラストスパート！");
        }
        habit.total++;
        habit.todayHits++;
        saveHabit();

        const dir = Vector.normalise(Vector.sub(victim.position, proj.position));
        nudgeFighter(victim, dir.x * 12, dir.y * 8);
        screenShake = Math.min(screenShake + 3, 8);
        counterBounce = 2;
        spawnParticles(
          (proj.position.x + victim.position.x) / 2,
          (proj.position.y + victim.position.y) / 2,
          proj.plugin.ptype === "coin" ? "#f1c40f" : MC.yellow, 6
        );
        sfx("hit");
        if (victim.plugin.id === playerId || proj.plugin.shooterId === playerId) {
          speak(victim.plugin, randomLine(victim.plugin, "hit"));
        }
        showFx(
          (proj.position.x + victim.position.x) / 2,
          (proj.position.y + victim.position.y) / 2,
          combo > 1 ? `COMBO x${combo}!` : "直撃!",
          "#FF6B9D"
        );
        Composite.remove(world, proj);
        projectiles.delete(proj);
        updateUI();

        if (hpMap[victim.plugin.id] <= 0) {
          knockDown(victim);
        }
      }
    });

    function canvasCoords(e) {
      const r = canvas.getBoundingClientRect();
      return {
        x: ((e.clientX - r.left) / r.width) * W,
        y: ((e.clientY - r.top) / r.height) * H,
      };
    }

    function startHold(e) {
      if (!playerId || gameResult || e.target.closest("#char-select")) return;
      e.preventDefault();
      ensureAudio();
      holdingFire = true;
      const { x, y } = canvasCoords(e);
      lastAim = { x, y };
      playerThrow(x, y);
      clearInterval(holdFireTimer);
      holdFireTimer = setInterval(() => playerThrow(lastAim.x, lastAim.y), 120);
    }

    wrap.addEventListener("mousedown", startHold);
    wrap.addEventListener("touchstart", startHold, { passive: false });

    wrap.addEventListener("mousemove", e => {
      if (!holdingFire) return;
      lastAim = canvasCoords(e);
    });
    wrap.addEventListener("touchmove", e => {
      if (!holdingFire || !e.touches[0]) return;
      lastAim = canvasCoords(e.touches[0]);
    }, { passive: true });

    const stopHold = () => {
      holdingFire = false;
      clearInterval(holdFireTimer);
    };
    wrap.addEventListener("mouseup", stopHold);
    wrap.addEventListener("mouseleave", stopHold);
    wrap.addEventListener("touchend", stopHold);
    wrap.addEventListener("touchcancel", stopHold);

    // ── 3D風キャラ描画 ──
    function skinSphere(ctx, y, skin, rx, ry) {
      const g = ctx.createRadialGradient(-4, y - 4, 2, 0, y, rx);
      g.addColorStop(0, lighten(skin, 30));
      g.addColorStop(0.6, skin);
      g.addColorStop(1, darken(skin, 25));
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(0, y, rx, ry, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    function lighten(c, n) {
      const r = Math.min(255, parseInt(c.slice(1,3),16) + n);
      const g = Math.min(255, parseInt(c.slice(3,5),16) + n);
      const b = Math.min(255, parseInt(c.slice(5,7),16) + n);
      return `rgb(${r},${g},${b})`;
    }
    function darken(c, n) {
      const r = Math.max(0, parseInt(c.slice(1,3),16) - n);
      const g = Math.max(0, parseInt(c.slice(3,5),16) - n);
      const b = Math.max(0, parseInt(c.slice(5,7),16) - n);
      return `rgb(${r},${g},${b})`;
    }
    function drawShadow(ctx) {
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.beginPath();
      ctx.ellipse(0, 52, 22, 7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    function drawEyes3D(ctx, y, big) {
      const s = big ? 1.15 : 1;
      [[-7, y], [7, y]].forEach(([ex, ey]) => {
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.ellipse(ex, ey, 5 * s, 6 * s, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#2c1810";
        ctx.beginPath(); ctx.ellipse(ex, ey + 1, 2.5 * s, 3.5 * s, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(ex + 1.5, ey - 1.5, 1.2, 0, Math.PI * 2); ctx.fill();
      });
    }
    function drawUniform3D(ctx) {
      const tg = ctx.createLinearGradient(-22, 10, 22, 50);
      tg.addColorStop(0, "#e83030");
      tg.addColorStop(0.5, MC.red);
      tg.addColorStop(1, "#a01010");
      ctx.fillStyle = tg;
      ctx.beginPath();
      ctx.moveTo(-24, 12); ctx.lineTo(24, 12); ctx.lineTo(20, 50); ctx.lineTo(-20, 50);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = MC.yellow;
      ctx.fillRect(-18, 18, 36, 11);
      ctx.fillStyle = MC.red;
      ctx.font = "bold 9px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("M", 0, 27);
      ctx.fillStyle = MC.red;
      ctx.fillRect(-16, -32, 32, 11);
    }
    function drawPerson3D(ctx, data, opts = {}) {
      const { skin, hair, role } = data;
      const sleeping = opts.sleeping;
      const windUp = opts.windUp || 0;

      drawShadow(ctx);

      // 足
      ctx.fillStyle = "#222";
      ctx.fillRect(-11, 48, 9, 16); ctx.fillRect(2, 48, 9, 16);

      if (role === "courier") {
        // ボロボロUberバッグ
        const bg = ctx.createLinearGradient(-28, 0, 28, 40);
        bg.addColorStop(0, "#0a8040");
        bg.addColorStop(1, "#044020");
        ctx.fillStyle = bg;
        ctx.fillRect(-26, 8, 52, 42);
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(-20, 15); ctx.lineTo(-10, 35); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(15, 20); ctx.lineTo(22, 40); ctx.stroke();
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(-26, 8, 52, 8);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 7px sans-serif";
        ctx.fillText("Uber", 0, 30);
        ctx.fillStyle = "#888";
        ctx.fillRect(-28, 12, 8, 20);
        ctx.fillRect(20, 12, 8, 20);
      } else if (role === "customer") {
        const cg = ctx.createLinearGradient(-22, 14, 22, 50);
        cg.addColorStop(0, "#4aa3df");
        cg.addColorStop(1, "#2471a3");
        ctx.fillStyle = cg;
        ctx.fillRect(-22, 14, 44, 36);
        ctx.fillStyle = "#1a5276";
        ctx.fillRect(-20, 50, 40, 14);
        // 300円を掴む
        const coinX = 20 + (windUp ? -8 : 0);
        const coinY = 10 + (windUp ? -6 : 0);
        ctx.fillStyle = "#f1c40f";
        ctx.beginPath(); ctx.arc(coinX, coinY, 10 + windUp * 3, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#d4ac0d"; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = "#b7950b";
        ctx.font = "bold 7px sans-serif";
        ctx.fillText("300", coinX, coinY + 2);
      } else {
        drawUniform3D(ctx);
      }

      // 体・首
      if (role !== "courier" && role !== "customer") {
        /* uniform already drawn */
      } else if (role === "courier") {
        ctx.fillStyle = "#06C167";
        ctx.fillRect(-22, 14, 44, 34);
      }

      // 首
      ctx.fillStyle = darken(skin, 10);
      ctx.fillRect(-5, 2, 10, 10);

      // 顔
      skinSphere(ctx, -8, skin, 20, 22);

      // 髪
      ctx.fillStyle = hair;
      if (role === "cute-clerk") {
        ctx.beginPath(); ctx.ellipse(0, -16, 22, 16, 0, Math.PI, 0); ctx.fill();
        ctx.fillRect(-22, -16, 10, 36); ctx.fillRect(12, -16, 10, 36);
        ctx.fillStyle = "#ff69b4";
        ctx.beginPath(); ctx.arc(18, -10, 5, 0, Math.PI * 2); ctx.fill();
      } else if (role === "handsome") {
        ctx.beginPath(); ctx.ellipse(0, -18, 21, 13, 0, Math.PI, 0); ctx.fill();
        ctx.fillStyle = MC.yellow;
        ctx.font = "9px sans-serif";
        ctx.fillText("✨", 20, -20);
      } else if (role === "courier") {
        ctx.beginPath(); ctx.ellipse(0, -16, 20, 12, 0, Math.PI, 0); ctx.fill();
        ctx.fillStyle = "#06C167";
        ctx.fillRect(-18, -28, 36, 10);
      } else {
        ctx.beginPath(); ctx.ellipse(0, -16, 19, 11, 0, Math.PI, 0); ctx.fill();
      }

      drawEyes3D(ctx, -8, role === "cute-clerk" || role === "handsome");

      // 口
      ctx.strokeStyle = darken(skin, 40);
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      if (sleeping) ctx.arc(0, 0, 4, 0, Math.PI);
      else ctx.arc(0, 2, 4, 0.15 * Math.PI, 0.85 * Math.PI);
      ctx.stroke();

      // ほっぺ
      if (role === "cute-clerk") {
        ctx.fillStyle = "rgba(255,120,120,0.45)";
        ctx.beginPath(); ctx.ellipse(-13, -2, 5, 3, 0, 0, Math.PI * 2); ctx.ellipse(13, -2, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
      }

      if (sleeping) {
        ctx.fillStyle = "#555";
        ctx.font = "bold 12px sans-serif";
        ctx.fillText("Z", 22, -28);
        ctx.font = "10px sans-serif";
        ctx.fillText("z", 30, -34);
        ctx.fillText("z", 36, -38);
      }
    }

    function drawCoin(ctx) {
      const g = ctx.createRadialGradient(-3, -3, 1, 0, 0, 11);
      g.addColorStop(0, "#ffe066");
      g.addColorStop(0.5, "#f1c40f");
      g.addColorStop(1, "#b7950b");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(0, 0, 11, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#9a7d0a"; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = "#7d6608";
      ctx.font = "bold 8px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("300", 0, 3);
      ctx.font = "6px sans-serif";
      ctx.fillText("円", 0, 10);
    }

    function drawBurger(ctx, ptype) {
      if (ptype === "bag") {
        ctx.fillStyle = "#06C167";
        ctx.beginPath();
        ctx.moveTo(-12, -7); ctx.lineTo(12, -7); ctx.lineTo(14, 9); ctx.lineTo(-14, 9);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = "#333"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(4, 6); ctx.stroke();
      } else {
        ctx.fillStyle = "#8B4513";
        ctx.beginPath(); ctx.ellipse(0, 5, 11, 4, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#f39c12";
        ctx.fillRect(-12, -2, 24, 5);
        ctx.fillStyle = "#27ae60";
        ctx.fillRect(-10, -6, 20, 3);
        ctx.fillStyle = "#7b4a1a";
        ctx.beginPath(); ctx.ellipse(0, -8, 12, 5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = MC.yellow;
        ctx.font = "bold 7px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("M", 0, 2);
      }
    }

    function drawHpBar(ctx, x, y, hp, maxHp) {
      const w = 48, h = 6;
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(x - w/2, y, w, h);
      const ratio = Math.max(0, hp / maxHp);
      const hg = ctx.createLinearGradient(x - w/2, y, x + w/2, y);
      hg.addColorStop(0, ratio > 0.3 ? "#27ae60" : "#e74c3c");
      hg.addColorStop(1, ratio > 0.3 ? "#2ecc71" : "#c0392b");
      ctx.fillStyle = hg;
      ctx.fillRect(x - w/2, y, w * ratio, h);
    }

    function drawDefeatOverlay(ctx, x, y, t) {
      ctx.save();
      ctx.translate(x, y + 20);
      ctx.rotate(0.4);
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = "#555";
      ctx.font = "bold 14px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("💫 K.O.", 0, 0);
      ctx.restore();
      for (let i = 0; i < 3; i++) {
        const a = t * 3 + i * 2.1;
        ctx.fillStyle = MC.yellow;
        ctx.font = "12px sans-serif";
        ctx.fillText("★", x + Math.cos(a) * 20, y - 10 + Math.sin(a) * 8);
      }
    }

    Events.on(render, "afterRender", () => {
      const ctx = render.context;
      const now = Date.now() / 1000;

      // パーティクル
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.04;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }

      for (const f of fighters) {
        const data = ROSTER.find(r => r.id === f.plugin.id);
        const { name, id, isClerk, role } = f.plugin;
        const isPlayer = id === playerId;
        const isDown = defeated.has(id);
        const anim = animState[id];
        if (anim.windUp > 0) anim.windUp = Math.max(0, anim.windUp - 0.08);
        if (anim.defeatT > 0) anim.defeatT += 0.02;

        ctx.save();
        ctx.translate(f.position.x, f.position.y);
        if (isDown) ctx.rotate(0.5 + Math.sin(anim.defeatT) * 0.05);
        else ctx.rotate(f.angle * 0.3);
        drawPerson3D(ctx, data, {
          sleeping: id === "ken" && kenSleeping,
          windUp: anim.windUp,
        });
        ctx.restore();

        ctx.font = "bold 11px 'Noto Sans JP'";
        ctx.textAlign = "center";
        ctx.strokeStyle = MC.brown;
        ctx.lineWidth = 3;
        const tag = (isPlayer ? "★ " : "") + name;
        ctx.strokeText(tag, f.position.x, f.position.y - 58);
        ctx.fillStyle = isPlayer ? MC.yellow : isDown ? "#aaa" : "#fff";
        ctx.fillText(tag, f.position.x, f.position.y - 58);

        if (!isDown) {
          const maxHp = data?.hp || MAX_HP;
          drawHpBar(ctx, f.position.x, f.position.y - 66, hpMap[id], maxHp);
        } else {
          drawDefeatOverlay(ctx, f.position.x, f.position.y, anim.defeatT);
        }
      }

      for (const p of projectiles) {
        ctx.save();
        ctx.translate(p.position.x, p.position.y);
        ctx.rotate(p.angle);
        if (p.plugin.ptype === "coin") drawCoin(ctx);
        else drawBurger(ctx, p.plugin.ptype);
        ctx.restore();
      }
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);

    setInterval(() => {
      if (screenShake > 0) screenShake *= 0.82;
      if (counterBounce > 0) counterBounce *= 0.75;
      for (const f of fighters) {
        if (defeated.has(f.plugin.id)) {
          Body.setPosition(f, { x: f.plugin.ax, y: f.plugin.ay });
          Body.setVelocity(f, { x: 0, y: 0 });
          continue;
        }
        const homeX = f.plugin.ax;
        const homeY = f.plugin.ay;
        Body.applyForce(f, f.position, {
          x: (homeX - f.position.x) * 0.0004,
          y: (homeY - f.position.y) * 0.0004,
        });
        Body.setVelocity(f, { x: f.velocity.x * 0.75, y: f.velocity.y * 0.75 });
        constrainFighter(f);
      }
    }, 50);

    setInterval(runBotAI, 350);

    setInterval(() => {
      if (!playerId || gameResult || Math.random() > 0.22) return;
      const bots = ROSTER.filter(r => r.id !== playerId && !defeated.has(r.id));
      if (!bots.length) return;
      const f = bots[Math.floor(Math.random() * bots.length)];
      speak(f, randomLine(f, "idle"));
    }, 5000);
  </script>
</body>
