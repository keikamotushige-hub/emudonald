<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>エムドナルド — バーガー大乱闘！</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Mochiy+Pop+One&display=swap");
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #DA291C;
      font-family: "Noto Sans JP", sans-serif;
      color: #fff;
      overflow-x: hidden;
    }
    .title {
      text-align: center;
      padding: 8px;
      font-family: "Mochiy Pop One", sans-serif;
      font-size: 17px;
      color: #FFC72C;
      text-shadow: 2px 2px 0 #27251F;
    }
    #wrap {
      position: relative;
      width: min(960px, 100vw);
      height: min(640px, calc(100vh - 160px));
      margin: 0 auto;
      border: 6px solid #FFC72C;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 0 #27251F, 0 12px 32px rgba(0,0,0,0.35);
    }
    canvas { display: block; width: 100%; height: 100%; }

    #char-select {
      position: absolute;
      inset: 0;
      z-index: 30;
      background: rgba(39,37,31,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      gap: 12px;
    }
    #char-select h2 {
      font-family: "Mochiy Pop One", sans-serif;
      color: #FFC72C;
      font-size: 18px;
      text-align: center;
    }
    #char-select p { font-size: 12px; color: #F5EBDC; text-align: center; }
    .char-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 520px;
      width: 100%;
    }
    .char-btn {
      font-family: "Mochiy Pop One", sans-serif;
      font-size: 12px;
      padding: 14px 8px;
      border: 3px solid #27251F;
      border-radius: 12px;
      cursor: pointer;
      background: #F5EBDC;
      color: #27251F;
      box-shadow: 0 4px 0 #27251F;
      transition: transform 0.1s;
    }
    .char-btn:hover { filter: brightness(1.05); }
    .char-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #27251F; }
    .char-btn .emoji { font-size: 28px; display: block; margin-bottom: 4px; }
    #char-select.hidden { display: none; }

    #meta {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 8px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), transparent);
      z-index: 5;
      pointer-events: none;
      font-size: 11px;
      color: #2d3436;
    }
    #meta .row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
    #player-label { color: #DA291C; font-weight: 900; }
    #combo { color: #FF6B9D; font-weight: 900; }
    #score { color: #06C167; font-weight: 900; }

    #speech-bubble {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 90%;
      background: #fff;
      color: #222;
      border: 3px solid #DA291C;
      border-radius: 16px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      z-index: 8;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #speech-bubble.show { opacity: 1; }

    #habit-panel, #controls {
      width: min(960px, 100vw);
      margin: 6px auto;
    }
    #habit-panel {
      padding: 8px 12px;
      background: #F5EBDC;
      border: 3px solid #FFC72C;
      border-radius: 4px;
      font-size: 12px;
      color: #27251F;
    }
    #habit-panel h3 {
      font-family: "Mochiy Pop One", sans-serif;
      color: #DA291C;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .habit-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
    .habit-stat {
      background: #fff;
      padding: 6px;
      border-radius: 6px;
      text-align: center;
      border: 1px solid #ffeaa7;
      font-size: 11px;
    }
    .habit-stat b { display: block; font-size: 18px; color: #FFC72C; }

    #controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    button.ctrl {
      font-family: "Mochiy Pop One", sans-serif;
      font-size: 12px;
      padding: 8px 14px;
      border: 3px solid #27251F;
      border-radius: 8px;
      cursor: pointer;
      background: #FFC72C;
      color: #27251F;
      box-shadow: 0 4px 0 #27251F;
    }
    button.ctrl:active { transform: translateY(3px); box-shadow: 0 1px 0 #27251F; }
    button.ctrl.off { background: #636e72; color: #ccc; }

    #uber-optional {
      width: min(960px, 100vw);
      margin: 6px auto 14px;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.85);
    }
    #uber-optional a {
      color: #FFC72C;
      text-decoration: underline;
    }

    .fx {
      position: absolute;
      pointer-events: none;
      z-index: 15;
      font-family: "Mochiy Pop One", sans-serif;
      animation: fxUp 0.7s ease-out forwards;
      text-shadow: 2px 2px 0 #000;
    }
    @keyframes fxUp {
      0% { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
      100% { transform: translate(-50%,-120%) scale(1.2); opacity: 0; }
    }
    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #DA291C;
      color: #fff;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 900;
      z-index: 100;
      border: 3px solid #FFC72C;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="title">🍔 エムドナルド — バーガー大乱闘 🍔</div>

  <div id="wrap">
    <div id="char-select">
      <h2>誰になって戦う？</h2>
      <p>キャラを選んで、みんなにバーガーを投げ合おう！</p>
      <div class="char-grid" id="char-grid"></div>
    </div>
    <div id="meta">
      <div class="row">
        <span id="player-label">キャラ選択中…</span>
        <span id="combo">COMBO x0</span>
        <span id="score">ヒット 0</span>
      </div>
    </div>
    <div id="speech-bubble"></div>
    <canvas id="canvas"></canvas>
  </div>

  <div id="habit-panel">
    <h3>📊 バトル記録</h3>
    <div class="habit-grid">
      <div class="habit-stat">総ヒット<b id="st-total">0</b></div>
      <div class="habit-stat">連続プレイ<b id="st-days">0</b>日</div>
      <div class="habit-stat">今日<b id="st-today">0</b>回</div>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl" id="btn-sound">🔊 音声 ON</button>
    <button class="ctrl" id="btn-change">🔄 キャラ変更</button>
  </div>

  <p id="uber-optional">
    ゲームを楽しんで、配達で稼ぎたくなったら →
    <a id="uber-link" href="https://www.uber.com/signup/drive/deliver/?invite_code=zzzxa28" target="_blank" rel="noopener noreferrer">Uber Eats 配達パートナー登録</a>
    （招待コード zzzxa28）
  </p>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script>
    const { Engine, Render, Runner, Bodies, Body, Composite, Events, Vector } = Matter;

    const W = 960, H = 640;
    const COUNTER_Y = H * 0.38;
    const wrap = document.getElementById("wrap");
    const canvas = document.getElementById("canvas");
    const bubble = document.getElementById("speech-bubble");
    canvas.width = W; canvas.height = H;

    const MC = { red: "#DA291C", yellow: "#FFC72C", cream: "#F5EBDC", brown: "#27251F" };
    const UBER_SIGNUP_URL = "https://www.uber.com/signup/drive/deliver/?invite_code=zzzxa28";

    const ROSTER = [
      {
        id: "yui", name: "ゆい", emoji: "✨", role: "cute-clerk",
        x: 0.18, y: 0.62,
        voice: { pitch: 1.45, rate: 1.1 },
        lines: {
          throw: ["いっけー！", "バーガーどぞ！", "えいっ！", "当てる！"],
          hit: ["きゃっ！", "あはは！", "えへへ！", "もう！"],
          idle: ["いらっしゃいませ〜", "可愛く決めた！", "バンッ！", "エムドナルド！"],
        },
      },
      {
        id: "ren", name: "レン", emoji: "👨‍🍳", role: "male-clerk",
        x: 0.38, y: 0.72,
        voice: { pitch: 0.95, rate: 1.08 },
        lines: {
          throw: ["ドン！", "受け取り！", "ホットで！", "いくぞ！"],
          hit: ["おっと！", "ナイス！", "まだ！", "よし！"],
          idle: ["新人店員レン", "レジ頑張る", "バーガー投げ！", "任せて！"],
        },
      },
      {
        id: "takuya", name: "タクヤ", emoji: "😎", role: "handsome",
        x: 0.62, y: 0.65,
        voice: { pitch: 0.82, rate: 1.0 },
        lines: {
          throw: ["イケメン直球！", "見てろ！", "決めた！", "カッコよく！"],
          hit: ["…まあいい", "ナイスショット", "ほほう", "再戦！"],
          idle: ["イケメン店員", "モテるレジ", "スマイル", "タクヤです"],
        },
      },
      {
        id: "ken", name: "ケン", emoji: "🚴", role: "courier", variant: 0,
        x: 0.82, y: 0.58,
        voice: { pitch: 0.95, rate: 1.12 },
        lines: {
          throw: ["配達投げ！", "ピックアップ！", "届ける！", "ケン行く！"],
          hit: ["うわ！", "バッグ！", "おっと！", "まだ届ける！"],
          idle: ["配達中", "バッグ持った", "ケンです", "急げ！"],
        },
      },
      {
        id: "sou", name: "ソウ", emoji: "🚴‍♂️", role: "courier", variant: 1,
        x: 0.28, y: 0.48,
        voice: { pitch: 0.88, rate: 1.0 },
        lines: {
          throw: ["ソウ投げ！", "配達GO！", "ほい！", "届けます！"],
          hit: ["痛っ！", "メガネ！", "わっ", "まだ行く！"],
          idle: ["ソウです", "自転車停めた", "配達員", "バッグある"],
        },
      },
      {
        id: "customer", name: "客・田中", emoji: "🧑", role: "customer",
        x: 0.52, y: 0.78,
        voice: { pitch: 1.0, rate: 1.05 },
        lines: {
          throw: ["注文のはずが！", "返す！", "これ返して！", "バーガー返却！"],
          hit: ["痛い！", "なにこれ！", "店長ー！", "もう！"],
          idle: ["バーガーください", "ポテトも", "待ってる", "お腹空いた"],
        },
      },
    ];

    let playerId = null;
    let playerHits = 0;
    let combo = 0;
    let comboTimer = null;
    let soundOn = true;
    let audioCtx = null;
    const burgers = new Set();
    const hitCooldown = new Map();
    const scores = Object.fromEntries(ROSTER.map(r => [r.id, 0]));

    const SAVE_KEY = "emudonald_habit_v3";
    let habit = loadHabit();
    function loadHabit() {
      try {
        const d = JSON.parse(localStorage.getItem(SAVE_KEY) || "{}");
        const today = new Date().toDateString();
        if (d.lastDate !== today) {
          if (d.lastDate === new Date(Date.now() - 86400000).toDateString()) d.streak = (d.streak || 0) + 1;
          else d.streak = 1;
          d.todayHits = 0;
          d.lastDate = today;
        }
        return { total: d.total || 0, streak: d.streak || 1, todayHits: d.todayHits || 0, lastDate: d.lastDate || today };
      } catch { return { total: 0, streak: 1, todayHits: 0, lastDate: new Date().toDateString() }; }
    }
    function saveHabit() {
      localStorage.setItem(SAVE_KEY, JSON.stringify(habit));
      updateUI();
    }
    function updateUI() {
      document.getElementById("st-total").textContent = habit.total;
      document.getElementById("st-days").textContent = habit.streak;
      document.getElementById("st-today").textContent = habit.todayHits;
      document.getElementById("combo").textContent = "COMBO x" + combo;
      document.getElementById("score").textContent = "ヒット " + playerHits;
      const p = ROSTER.find(r => r.id === playerId);
      document.getElementById("player-label").textContent = p ? `${p.emoji} 操作中: ${p.name}` : "キャラを選んでね";
    }
    updateUI();

    // ── キャラ選択 ──
    const charGrid = document.getElementById("char-grid");
    ROSTER.forEach(r => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "char-btn";
      btn.innerHTML = `<span class="emoji">${r.emoji}</span>${r.name}`;
      btn.onclick = () => startAs(r.id);
      charGrid.appendChild(btn);
    });

    function startAs(id) {
      playerId = id;
      playerHits = 0;
      document.getElementById("char-select").classList.add("hidden");
      updateUI();
      ensureAudio();
      const p = ROSTER.find(r => r.id === id);
      showToast(`${p.emoji} ${p.name} で大乱闘スタート！`);
      speak(p, "クリックでバーガー投げ！みんなと戦おう！");
    }

    document.getElementById("btn-change").onclick = () => {
      document.getElementById("char-select").classList.remove("hidden");
      playerId = null;
      updateUI();
    };

    // ── 音声 ──
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }
    function sfx(type) {
      if (!soundOn || !audioCtx) return;
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      if (type === "throw") {
        osc.type = "square";
        osc.frequency.setValueAtTime(200, t);
        osc.frequency.exponentialRampToValueAtTime(90, t + 0.1);
        gain.gain.setValueAtTime(0.12, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        osc.start(t); osc.stop(t + 0.1);
      } else if (type === "hit") {
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(100, t);
        osc.frequency.exponentialRampToValueAtTime(35, t + 0.18);
        gain.gain.setValueAtTime(0.18, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.18);
        osc.start(t); osc.stop(t + 0.18);
      } else if (type === "combo") {
        osc.type = "sine";
        osc.frequency.setValueAtTime(440 + combo * 25, t);
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
        osc.start(t); osc.stop(t + 0.12);
      }
    }
    function speak(fighter, line) {
      if (!soundOn || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(line);
      u.lang = "ja-JP";
      u.pitch = fighter.voice.pitch;
      u.rate = fighter.voice.rate;
      bubble.textContent = `${fighter.name}: ${line}`;
      bubble.classList.add("show");
      clearTimeout(bubble._t);
      bubble._t = setTimeout(() => bubble.classList.remove("show"), 2200);
      window.speechSynthesis.speak(u);
    }
    function randomLine(f, kind) {
      const arr = f.lines[kind];
      return arr[Math.floor(Math.random() * arr.length)];
    }
    document.getElementById("btn-sound").onclick = function () {
      ensureAudio();
      soundOn = !soundOn;
      this.textContent = soundOn ? "🔊 音声 ON" : "🔇 音声 OFF";
      this.classList.toggle("off", !soundOn);
    };
    function showToast(msg) {
      const t = document.createElement("div");
      t.className = "toast";
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }
    function showFx(x, y, text, color = MC.yellow) {
      const el = document.createElement("div");
      el.className = "fx";
      el.textContent = text;
      el.style.color = color;
      el.style.left = (x / W * wrap.clientWidth) + "px";
      el.style.top = (y / H * wrap.clientHeight) + "px";
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 700);
    }

    // ── Matter.js ──
    const engine = Engine.create({ gravity: { x: 0, y: 0.22 } });
    const world = engine.world;
    const render = Render.create({
      canvas, engine,
      options: { width: W, height: H, wireframes: false, background: MC.cream },
    });

    function drawGoldenArches(ctx, cx, cy, size) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.strokeStyle = MC.yellow;
      ctx.lineWidth = size * 0.2;
      ctx.lineCap = "round";
      const r = size * 0.38;
      ctx.beginPath(); ctx.arc(-r * 0.52, r * 0.35, r, Math.PI, 0); ctx.stroke();
      ctx.beginPath(); ctx.arc(r * 0.52, r * 0.35, r, Math.PI, 0); ctx.stroke();
      ctx.restore();
    }

    function drawStore(ctx) {
      ctx.fillStyle = MC.cream;
      ctx.fillRect(0, 0, W, H);
      // 天井
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, W, 44);
      for (let i = 0; i < 8; i++) {
        const lx = 60 + i * 115;
        ctx.fillStyle = "rgba(255,199,44,0.3)";
        ctx.beginPath(); ctx.ellipse(lx, 36, 36, 12, 0, 0, Math.PI * 2); ctx.fill();
      }
      // 壁
      ctx.fillStyle = MC.red;
      ctx.fillRect(0, H - 48, W, 48);
      // 床タイル
      const tile = 32;
      for (let y = H - 200; y < H; y += tile) {
        for (let x = 0; x < W; x += tile) {
          ctx.fillStyle = ((x / tile | 0) + (y / tile | 0)) % 2 ? MC.cream : "#E8D5C4";
          ctx.fillRect(x, y, tile, tile);
        }
      }
      // 看板
      ctx.fillStyle = MC.red;
      ctx.fillRect(W/2 - 100, 52, 200, 80);
      drawGoldenArches(ctx, W/2, 88, 70);
      ctx.fillStyle = MC.yellow;
      ctx.font = "bold 13px 'Noto Sans JP'";
      ctx.textAlign = "center";
      ctx.fillText("エムドナルド", W/2, 118);
      // ★ 黒い一長カウンター
      const cw = W * 0.88, ch = 14, cy = COUNTER_Y;
      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect((W - cw) / 2, cy - ch / 2, cw, ch);
      ctx.fillStyle = "#333";
      ctx.fillRect((W - cw) / 2, cy - ch / 2 - 4, cw, 4);
      ctx.strokeStyle = MC.brown;
      ctx.lineWidth = 2;
      ctx.strokeRect((W - cw) / 2, cy - ch / 2 - 4, cw, ch + 4);
      ctx.fillStyle = "#888";
      ctx.font = "9px 'Noto Sans JP'";
      ctx.fillText("━━━━ レジカウンター ━━━━", W/2, cy + 3);
    }

    Events.on(render, "beforeRender", () => drawStore(render.context));

    Composite.add(world, [
      Bodies.rectangle(W/2, -20, W, 40, { isStatic: true, render: { visible: false } }),
      Bodies.rectangle(W/2, H + 20, W, 40, { isStatic: true, render: { visible: false } }),
      Bodies.rectangle(-20, H/2, 40, H, { isStatic: true, render: { visible: false } }),
      Bodies.rectangle(W + 20, H/2, 40, H, { isStatic: true, render: { visible: false } }),
      Bodies.rectangle(W/2, COUNTER_Y, W * 0.88, 14, { isStatic: true, render: { visible: false } }),
    ]);

    const fighters = ROSTER.map(r => {
      const body = Bodies.circle(r.x * W, r.y * H, 36, {
        label: "fighter",
        restitution: 0.55,
        frictionAir: 0.12,
        render: { visible: false },
        plugin: { ...r, ax: r.x * W, ay: r.y * H },
      });
      return body;
    });
    Composite.add(world, fighters);

    function getFighterBody(id) {
      return fighters.find(f => f.plugin.id === id);
    }

    function spawnBurger(shooterBody, tx, ty) {
      const shooter = shooterBody.plugin;
      const from = shooterBody.position;
      const dir = Vector.normalise(Vector.sub({ x: tx, y: ty }, from));
      const isCourier = shooter.role === "courier";
      const burger = Bodies.circle(from.x, from.y - 28, 14, {
        label: "burger",
        restitution: 0.92,
        frictionAir: 0.008,
        render: { visible: false },
        plugin: { shooterId: shooter.id, isBag: isCourier },
      });
      Body.setVelocity(burger, { x: dir.x * 19, y: dir.y * 19 });
      Body.setAngularVelocity(burger, (Math.random() - 0.5) * 0.35);
      Composite.add(world, burger);
      burgers.add(burger);
      sfx("throw");
      if (shooter.id === playerId) speak(shooter, randomLine(shooter, "throw"));
      showFx(from.x, from.y, "バンッ！", isCourier ? "#06C167" : MC.yellow);
      setTimeout(() => {
        if (burgers.has(burger)) { Composite.remove(world, burger); burgers.delete(burger); }
      }, 3500);
    }

    Events.on(engine, "collisionStart", ({ pairs }) => {
      for (const { bodyA: a, bodyB: b } of pairs) {
        const burger = [a, b].find(x => x.label === "burger");
        const victim = [a, b].find(x => x.label === "fighter");
        if (!burger || !victim) continue;
        if (burger.plugin.shooterId === victim.plugin.id) continue;
        const key = burger.id + "-" + victim.id;
        if (hitCooldown.has(key)) continue;
        hitCooldown.set(key, true);
        setTimeout(() => hitCooldown.delete(key), 180);

        const shooterData = ROSTER.find(r => r.id === burger.plugin.shooterId);
        scores[shooterData.id]++;
        if (burger.plugin.shooterId === playerId) {
          playerHits++;
          combo++;
          clearTimeout(comboTimer);
          comboTimer = setTimeout(() => { combo = 0; updateUI(); }, 1600);
          if (combo >= 3) sfx("combo");
        }
        habit.total++;
        habit.todayHits++;
        saveHabit();

        const dir = Vector.normalise(Vector.sub(victim.position, burger.position));
        Body.applyForce(victim, victim.position, { x: dir.x * 0.14, y: dir.y * 0.14 });
        sfx("hit");
        speak(victim.plugin, randomLine(victim.plugin, "hit"));
        showFx(
          (burger.position.x + victim.position.x) / 2,
          (burger.position.y + victim.position.y) / 2,
          combo > 1 ? `COMBO x${combo}!` : "直撃!",
          "#FF6B9D"
        );
        Composite.remove(world, burger);
        burgers.delete(burger);
      }
    });

    wrap.addEventListener("click", e => {
      if (!playerId || e.target.closest("#char-select")) return;
      ensureAudio();
      const r = canvas.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width) * W;
      const y = ((e.clientY - r.top) / r.height) * H;
      const player = getFighterBody(playerId);
      if (player) spawnBurger(player, x, y);
    });

    // ── 描画 ──
    function skinGrad(ctx, y) {
      const g = ctx.createRadialGradient(0, y, 2, 0, y, 20);
      g.addColorStop(0, "#ffe0bd");
      g.addColorStop(1, "#d4a574");
      return g;
    }

    function drawUniform(ctx, label) {
      ctx.fillStyle = MC.red;
      ctx.fillRect(-22, 12, 44, 38);
      ctx.fillStyle = MC.yellow;
      ctx.fillRect(-18, 16, 36, 12);
      ctx.fillStyle = MC.red;
      ctx.font = "bold 10px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(label || "M", 0, 26);
      ctx.fillStyle = MC.red;
      ctx.fillRect(-14, -28, 28, 10);
    }

    function drawCuteClerk(ctx) {
      drawUniform(ctx, "M");
      ctx.fillStyle = "#2d3436";
      ctx.beginPath();
      ctx.moveTo(-18, 50); ctx.lineTo(-22, 66); ctx.lineTo(22, 66); ctx.lineTo(18, 50);
      ctx.fill();
      ctx.fillStyle = "#111";
      ctx.fillRect(-12, 66, 9, 14); ctx.fillRect(3, 66, 9, 14);
      ctx.fillStyle = skinGrad(ctx, -8);
      ctx.beginPath(); ctx.ellipse(0, -6, 19, 21, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#4a2c2a";
      ctx.beginPath(); ctx.ellipse(0, -12, 21, 18, 0, Math.PI, 0); ctx.fill();
      ctx.fillRect(-20, -12, 9, 32); ctx.fillRect(11, -12, 9, 32);
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.ellipse(-7, -8, 6, 7, 0, 0, Math.PI * 2); ctx.ellipse(7, -8, 6, 7, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#3d2314";
      ctx.beginPath(); ctx.ellipse(-7, -7, 3, 4, 0, 0, Math.PI * 2); ctx.ellipse(7, -7, 3, 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "rgba(255,120,120,0.5)";
      ctx.beginPath(); ctx.ellipse(-12, 0, 4, 2.5, 0, 0, Math.PI * 2); ctx.ellipse(12, 0, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();
    }

    function drawMaleClerk(ctx) {
      drawUniform(ctx, "M");
      ctx.fillStyle = "#2d3436";
      ctx.fillRect(-20, 50, 40, 16);
      ctx.fillStyle = "#111";
      ctx.fillRect(-12, 66, 10, 14); ctx.fillRect(2, 66, 10, 14);
      ctx.fillStyle = skinGrad(ctx, -6);
      ctx.beginPath(); ctx.ellipse(0, -4, 18, 20, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#2c1810";
      ctx.fillRect(-16, -20, 32, 10);
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.ellipse(-6, -8, 4, 5, 0, 0, Math.PI * 2); ctx.ellipse(6, -8, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#222";
      ctx.beginPath(); ctx.ellipse(-6, -8, 2, 2.5, 0, 0, Math.PI * 2); ctx.ellipse(6, -8, 2, 2.5, 0, 0, Math.PI * 2); ctx.fill();
    }

    function drawHandsome(ctx) {
      drawUniform(ctx, "M");
      ctx.fillStyle = "#2d3436";
      ctx.fillRect(-20, 50, 40, 16);
      ctx.fillStyle = skinGrad(ctx, -6);
      ctx.beginPath(); ctx.ellipse(0, -4, 19, 21, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#1a1a1a";
      ctx.beginPath(); ctx.ellipse(0, -14, 20, 12, 0, Math.PI, 0); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.ellipse(-7, -8, 5, 6, 0, 0, Math.PI * 2); ctx.ellipse(7, -8, 5, 6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#222";
      ctx.beginPath(); ctx.ellipse(-7, -8, 2.5, 3, 0, 0, Math.PI * 2); ctx.ellipse(7, -8, 2.5, 3, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#333"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, 2, 5, 0.2 * Math.PI, 0.8 * Math.PI); ctx.stroke();
      ctx.fillStyle = MC.yellow;
      ctx.font = "10px sans-serif";
      ctx.fillText("✨", 18, -18);
    }

    function drawCourier(ctx, variant) {
      const glasses = variant === 1;
      ctx.fillStyle = "#111";
      ctx.fillRect(-12, 64, 10, 14); ctx.fillRect(2, 64, 10, 14);
      ctx.fillStyle = "#06C167";
      ctx.fillRect(-24, 10, 48, 40);
      ctx.fillStyle = "#111";
      ctx.fillRect(-24, 10, 48, 7);
      ctx.fillStyle = skinGrad(ctx, 20);
      ctx.beginPath(); ctx.ellipse(-28, 26, 7, 12, -0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(28, 26, 7, 12, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#05a558";
      ctx.fillRect(-30, 4, 22, 32);
      ctx.fillStyle = skinGrad(ctx, -6);
      ctx.beginPath(); ctx.ellipse(0, -4, 17, 19, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = glasses ? "#5d4037" : "#111";
      ctx.beginPath(); ctx.ellipse(0, -14, 19, 12, 0, Math.PI, 0); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.ellipse(-6, -8, 4, 5, 0, 0, Math.PI * 2); ctx.ellipse(6, -8, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
      if (glasses) {
        ctx.strokeStyle = "#333"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(-6, -8, 5, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(6, -8, 5, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.fillStyle = "#06C167";
      ctx.fillRect(-16, -26, 32, 9);
    }

    function drawCustomer(ctx) {
      ctx.fillStyle = "#3498db";
      ctx.fillRect(-22, 14, 44, 36);
      ctx.fillStyle = "#2980b9";
      ctx.fillRect(-20, 50, 40, 18);
      ctx.fillStyle = "#111";
      ctx.fillRect(-12, 68, 10, 12); ctx.fillRect(2, 68, 10, 12);
      ctx.fillStyle = skinGrad(ctx, -6);
      ctx.beginPath(); ctx.ellipse(0, -4, 18, 20, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#4a3728";
      ctx.fillRect(-15, -18, 30, 10);
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.ellipse(-6, -8, 4, 5, 0, 0, Math.PI * 2); ctx.ellipse(6, -8, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#e67e22";
      ctx.fillRect(20, 8, 18, 14);
      ctx.fillStyle = "#f39c12";
      ctx.fillRect(22, 6, 14, 4);
      ctx.fillStyle = "#fff";
      ctx.font = "7px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("注文", 29, 18);
    }

    function drawBurger(ctx, isBag) {
      if (isBag) {
        ctx.fillStyle = "#06C167";
        ctx.beginPath();
        ctx.moveTo(-12, -7); ctx.lineTo(12, -7); ctx.lineTo(14, 9); ctx.lineTo(-14, 9);
        ctx.closePath(); ctx.fill();
      } else {
        ctx.fillStyle = "#27ae60"; ctx.fillRect(-10, -6, 20, 3);
        ctx.fillStyle = "#f39c12"; ctx.fillRect(-12, -2, 24, 5);
        ctx.fillStyle = "#8B4513"; ctx.fillRect(-10, 3, 20, 4);
        ctx.fillStyle = MC.yellow; ctx.font = "bold 7px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("M", 0, 2);
      }
    }

    function drawCharacter(ctx, role, variant) {
      if (role === "cute-clerk") drawCuteClerk(ctx);
      else if (role === "male-clerk") drawMaleClerk(ctx);
      else if (role === "handsome") drawHandsome(ctx);
      else if (role === "courier") drawCourier(ctx, variant ?? 0);
      else drawCustomer(ctx);
    }

    Events.on(render, "afterRender", () => {
      const ctx = render.context;
      for (const f of fighters) {
        const { role, name, variant, id } = f.plugin;
        const isPlayer = id === playerId;
        ctx.save();
        ctx.translate(f.position.x, f.position.y);
        ctx.rotate(f.angle);
        drawCharacter(ctx, role, variant);
        ctx.restore();
        ctx.font = "bold 11px 'Noto Sans JP'";
        ctx.textAlign = "center";
        ctx.strokeStyle = MC.brown;
        ctx.lineWidth = 3;
        const tag = (isPlayer ? "★ " : "") + name;
        ctx.strokeText(tag, f.position.x, f.position.y - 48);
        ctx.fillStyle = isPlayer ? MC.yellow : "#fff";
        ctx.fillText(tag, f.position.x, f.position.y - 48);
      }
      for (const b of burgers) {
        ctx.save();
        ctx.translate(b.position.x, b.position.y);
        ctx.rotate(b.angle);
        drawBurger(ctx, b.plugin.isBag);
        ctx.restore();
      }
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);

    setInterval(() => {
      for (const f of fighters) {
        Body.applyForce(f, f.position, {
          x: (f.plugin.ax - f.position.x) * 0.00006,
          y: (f.plugin.ay - f.position.y) * 0.00006,
        });
        Body.setVelocity(f, { x: f.velocity.x * 0.92, y: f.velocity.y * 0.92 });
      }
    }, 50);

    // NPC が互いにバーガーを投げ合う
    setInterval(() => {
      if (!playerId) return;
      const npcs = fighters.filter(f => f.plugin.id !== playerId);
      if (!npcs.length) return;
      const shooter = npcs[Math.floor(Math.random() * npcs.length)];
      const targets = fighters.filter(f => f.id !== shooter.id);
      const target = targets[Math.floor(Math.random() * targets.length)];
      spawnBurger(shooter, target.position.x + (Math.random() - 0.5) * 60, target.position.y);
    }, 2200);

    setInterval(() => {
      if (!playerId || Math.random() > 0.35) return;
      const f = ROSTER[Math.floor(Math.random() * ROSTER.length)];
      speak(f, randomLine(f, "idle"));
    }, 6000);
  </script>
</body>
</html>
