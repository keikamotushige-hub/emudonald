<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>エムドナルド — バーガー大乱闘！</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Mochiy+Pop+One&display=swap");
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #DA291C;
      font-family: "Noto Sans JP", sans-serif;
      color: #fff;
      overflow-x: hidden;
    }
    .title {
      text-align: center;
      padding: 8px;
      font-family: "Mochiy Pop One", sans-serif;
      font-size: 17px;
      color: #FFC72C;
      text-shadow: 2px 2px 0 #27251F;
    }
    #wrap {
      position: relative;
      width: min(960px, 100vw);
      height: min(640px, calc(100vh - 160px));
      margin: 0 auto;
      border: 6px solid #FFC72C;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 0 #27251F, 0 12px 32px rgba(0,0,0,0.35);
    }
    canvas { display: block; width: 100%; height: 100%; }

    #char-select {
      position: absolute;
      inset: 0;
      z-index: 30;
      background: rgba(39,37,31,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      gap: 12px;
    }
    #char-select h2 {
      font-family: "Mochiy Pop One", sans-serif;
      color: #FFC72C;
      font-size: 18px;
      text-align: center;
    }
    #char-select p { font-size: 12px; color: #F5EBDC; text-align: center; }
    .char-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 520px;
      width: 100%;
    }
    .char-btn {
      font-family: "Mochiy Pop One", sans-serif;
      font-size: 12px;
      padding: 14px 8px;
      border: 3px solid #27251F;
      border-radius: 12px;
      cursor: pointer;
      background: #F5EBDC;
      color: #27251F;
      box-shadow: 0 4px 0 #27251F;
      transition: transform 0.1s;
    }
    .char-btn:hover { filter: brightness(1.05); }
    .char-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #27251F; }
    .char-btn .emoji { font-size: 28px; display: block; margin-bottom: 4px; }
    #char-select.hidden { display: none; }

    #meta {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 8px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), transparent);
      z-index: 5;
      pointer-events: none;
      font-size: 11px;
      color: #2d3436;
    }
    #meta .row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
    #player-label { color: #DA291C; font-weight: 900; }
    #combo { color: #FF6B9D; font-weight: 900; }
    #score { color: #06C167; font-weight: 900; }

    #bot-count { color: #636e72; font-weight: 900; }

    #fight-hint {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      font-size: 11px;
      color: #27251F;
      background: rgba(255,199,44,0.9);
      padding: 4px 12px;
      border-radius: 999px;
      border: 2px solid #27251F;
      pointer-events: none;
      font-weight: 700;
    }
    #speech-bubble {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 90%;
      background: #fff;
      color: #222;
      border: 3px solid #DA291C;
      border-radius: 16px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      z-index: 8;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #speech-bubble.show { opacity: 1; }

    #game-over {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(39,37,31,0.88);
      gap: 12px;
    }
    #game-over.show { display: flex; }
    #game-over .go-title {
      font-family: "Mochiy Pop One", sans-serif;
      font-size: clamp(36px, 8vw, 64px);
      color: #FFC72C;
      text-shadow: 4px 4px 0 #27251F, 0 0 24px rgba(255,199,44,0.6);
      animation: winPulse 0.8s ease-in-out infinite alternate;
    }
    #game-over.lose .go-title { color: #ff7675; text-shadow: 4px 4px 0 #27251F; animation: none; }
    @keyframes winPulse {
      from { transform: scale(1); }
      to { transform: scale(1.06); }
    }
    #game-over p { color: #F5EBDC; font-size: 14px; text-align: center; max-width: 320px; }
    #game-over button {
      font-family: "Mochiy Pop One", sans-serif;
      font-size: 14px;
      padding: 12px 24px;
      border: 3px solid #27251F;
      border-radius: 12px;
      cursor: pointer;
      background: #FFC72C;
      color: #27251F;
      box-shadow: 0 4px 0 #27251F;
    }

    #habit-panel, #controls {
      width: min(960px, 100vw);
      margin: 6px auto;
    }
    #habit-panel {
      padding: 8px 12px;
      background: #F5EBDC;
      border: 3px solid #FFC72C;
      border-radius: 4px;
      font-size: 12px;
      color: #27251F;
    }
    #habit-panel h3 {
      font-family: "Mochiy Pop One", sans-serif;
      color: #DA291C;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .habit-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
    .habit-stat {
      background: #fff;
      padding: 6px;
      border-radius: 6px;
      text-align: center;
      border: 1px solid #ffeaa7;
      font-size: 11px;
    }
    .habit-stat b { display: block; font-size: 18px; color: #FFC72C; }

    #controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    button.ctrl {
      font-family: "Mochiy Pop One", sans-serif;
      font-size: 12px;
      padding: 8px 14px;
      border: 3px solid #27251F;
      border-radius: 8px;
      cursor: pointer;
      background: #FFC72C;
      color: #27251F;
      box-shadow: 0 4px 0 #27251F;
    }
    button.ctrl:active { transform: translateY(3px); box-shadow: 0 1px 0 #27251F; }
    button.ctrl.off { background: #636e72; color: #ccc; }

    #uber-optional {
      width: min(960px, 100vw);
      margin: 6px auto 14px;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.85);
    }
    #uber-optional a {
      color: #FFC72C;
      text-decoration: underline;
    }

    .fx {
      position: absolute;
      pointer-events: none;
      z-index: 15;
      font-family: "Mochiy Pop One", sans-serif;
      animation: fxUp 0.7s ease-out forwards;
      text-shadow: 2px 2px 0 #000;
    }
    @keyframes fxUp {
      0% { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
      100% { transform: translate(-50%,-120%) scale(1.2); opacity: 0; }
    }
    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #DA291C;
      color: #fff;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 900;
      z-index: 100;
      border: 3px solid #FFC72C;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="title">🍔 エムドナルド — 店内バトル 🍔</div>

  <div id="wrap">
    <div id="char-select">
      <h2>誰になって戦う？</h2>
      <p>店員はバーガー、客は300円を投げる！<br>店員を倒せば YOU WIN — 倒されたら YOU LOSE</p>
      <div class="char-grid" id="char-grid"></div>
    </div>
    <div id="meta">
      <div class="row">
        <span id="player-label">キャラ選択中…</span>
        <span id="player-hp">HP ████████ 100</span>
        <span id="bot-count">🤖 0体</span>
        <span id="score">店員撃破 0/3</span>
      </div>
    </div>
    <div id="fight-hint">長押し連射！店員を倒して YOU WIN を目指せ</div>
    <div id="speech-bubble"></div>
    <div id="game-over">
      <div class="go-title" id="go-title">YOU WIN!</div>
      <p id="go-msg">店員全員を倒した！</p>
      <button type="button" id="btn-retry">もう一度</button>
    </div>
    <canvas id="canvas"></canvas>
  </div>

  <div id="habit-panel">
    <h3>📊 バトル記録</h3>
    <div class="habit-grid">
      <div class="habit-stat">総ヒット<b id="st-total">0</b></div>
      <div class="habit-stat">連続プレイ<b id="st-days">0</b>日</div>
      <div class="habit-stat">今日<b id="st-today">0</b>回</div>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl" id="btn-sound">🔊 音声 ON</button>
    <button class="ctrl" id="btn-change">🔄 キャラ変更</button>
  </div>

  <p id="uber-optional">
    ゲームを楽しんで、配達で稼ぎたくなったら →
    <a id="uber-link" href="https://www.uber.com/signup/drive/deliver/?invite_code=zzzxa28" target="_blank" rel="noopener noreferrer">Uber Eats 配達パートナー登録</a>
    （招待コード zzzxa28）
  </p>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script>
    const { Engine, Render, Runner, Bodies, Body, Composite, Events, Vector } = Matter;

    const W = 960, H = 640;
    const COUNTER_Y = H * 0.42;
    const CLERK_Y = H * 0.34;
    const CUSTOMER_Y = H * 0.58;
    const wrap = document.getElementById("wrap");
    const canvas = document.getElementById("canvas");
    const bubble = document.getElementById("speech-bubble");
    canvas.width = W; canvas.height = H;

    const MC = { red: "#DA291C", yellow: "#FFC72C", cream: "#F5EBDC", brown: "#27251F" };
    const UBER_SIGNUP_URL = "https://www.uber.com/signup/drive/deliver/?invite_code=zzzxa28";

    const MAX_HP = 100;
    const CLERK_HP = 120;
    const DAMAGE = { burger: 16, coin: 12, bag: 14 };
    const CLERK_IDS = ["yui", "ren", "takuya"];

    const ROSTER = [
      {
        id: "yui", name: "ゆい", emoji: "✨", role: "cute-clerk",
        x: 0.22, y: CLERK_Y / H,
        hp: CLERK_HP, isClerk: true,
        voice: { pitch: 1.45, rate: 1.1 },
        lines: {
          throw: ["バーガーどぞ！", "いっけー！", "当てる！", "注文どうぞ！"],
          hit: ["きゃっ！", "痛い！", "まだ立つ！", "負けない！"],
          idle: ["いらっしゃいませ〜", "レジ番！", "エムドナルド！", "バンッ！"],
          fall: ["うわぁ…倒れた…", "店長ー！"],
        },
      },
      {
        id: "ren", name: "レン", emoji: "💇", role: "messy-clerk",
        x: 0.42, y: CLERK_Y / H,
        hp: CLERK_HP, isClerk: true,
        voice: { pitch: 0.95, rate: 1.08 },
        lines: {
          throw: ["ドン！", "ボサボサ投げ！", "受け取り！", "ホットで！"],
          hit: ["おっと！", "髪！", "まだ！", "強い…！"],
          idle: ["ボサボサ店員", "レンです", "バーガー投げ！", "任せて！"],
          fall: ["倒れた…", "もう無理…"],
        },
      },
      {
        id: "takuya", name: "タクヤ", emoji: "😎", role: "handsome",
        x: 0.62, y: CLERK_Y / H,
        hp: CLERK_HP, isClerk: true,
        voice: { pitch: 0.82, rate: 1.0 },
        lines: {
          throw: ["イケメン直球！", "見てろ！", "決めた！", "最強店員！"],
          hit: ["…まあいい", "ナイス", "まだ余裕", "強い客…"],
          idle: ["イケメン店員", "モテるレジ", "タクヤです", "スマイル"],
          fall: ["くっ…！", "負けた…"],
        },
      },
      {
        id: "ken", name: "ケン", emoji: "🚴", role: "courier", variant: 0,
        x: 0.84, y: 0.48,
        hp: MAX_HP, isClerk: false,
        voice: { pitch: 0.95, rate: 1.12 },
        lines: {
          throw: ["配達投げ！", "ピックアップ！", "届ける！", "ケン行く！"],
          hit: ["うわ！", "バッグ！", "おっと！", "まだ届ける！"],
          idle: ["配達中", "Uber Eats", "急げ！", "ケンです"],
          fall: ["配達中断…", "倒れた…"],
        },
      },
      {
        id: "customer", name: "客・田中", emoji: "🧑", role: "customer",
        x: 0.50, y: CUSTOMER_Y / H,
        hp: MAX_HP, isClerk: false,
        voice: { pitch: 1.0, rate: 1.05 },
        lines: {
          throw: ["300円！", "はいどうぞ！", "お釣りない！", "コイン投げ！"],
          hit: ["痛い！", "なにこれ！", "店長ー！", "もう！"],
          idle: ["バーガーください", "300円", "待ってる", "お腹空いた"],
          fall: ["財布…", "倒れた…"],
        },
      },
    ];

    let playerId = null;
    let playerHits = 0;
    let gameResult = null;
    let soundOn = true;
    let audioCtx = null;
    let playerThrowReady = true;
    let holdingFire = false;
    let holdFireTimer = null;
    let lastAim = { x: W / 2, y: H / 2 };
    const botThrowReady = new Map();
    const projectiles = new Set();
    const hitCooldown = new Map();
    const hpMap = Object.fromEntries(ROSTER.map(r => [r.id, r.hp || MAX_HP]));
    const fallen = new Set();

    const SAVE_KEY = "emudonald_habit_v3";
    let habit = loadHabit();
    function loadHabit() {
      try {
        const d = JSON.parse(localStorage.getItem(SAVE_KEY) || "{}");
        const today = new Date().toDateString();
        if (d.lastDate !== today) {
          if (d.lastDate === new Date(Date.now() - 86400000).toDateString()) d.streak = (d.streak || 0) + 1;
          else d.streak = 1;
          d.todayHits = 0;
          d.lastDate = today;
        }
        return { total: d.total || 0, streak: d.streak || 1, todayHits: d.todayHits || 0, lastDate: d.lastDate || today };
      } catch { return { total: 0, streak: 1, todayHits: 0, lastDate: new Date().toDateString() }; }
    }
    function saveHabit() {
      localStorage.setItem(SAVE_KEY, JSON.stringify(habit));
      updateUI();
    }
    function hpBar(n, max) {
      const filled = Math.max(0, Math.ceil((n / max) * 8));
      return "█".repeat(filled) + "░".repeat(8 - filled);
    }
    function updateUI() {
      document.getElementById("st-total").textContent = habit.total;
      document.getElementById("st-days").textContent = habit.streak;
      document.getElementById("st-today").textContent = habit.todayHits;
      const p = ROSTER.find(r => r.id === playerId);
      const php = playerId ? hpMap[playerId] : MAX_HP;
      const pmax = p?.hp || MAX_HP;
      document.getElementById("player-hp").textContent = playerId
        ? `HP ${hpBar(php, pmax)} ${Math.max(0, Math.ceil(php))}`
        : "";
      document.getElementById("player-label").textContent = p
        ? `${p.emoji} 操作中: ${p.name}`
        : "キャラを選んでね";
      const bots = playerId ? ROSTER.filter(r => r.id !== playerId && !fallen.has(r.id)).length : 0;
      document.getElementById("bot-count").textContent = playerId ? `🤖 残り ${bots}体` : "";
      const clerksDown = enemyClerks().filter(id => fallen.has(id)).length;
      const clerksTotal = playerId ? enemyClerks().length : 3;
      document.getElementById("score").textContent = playerId
        ? `店員撃破 ${clerksDown}/${clerksTotal}`
        : "店員撃破 0/3";
    }
    updateUI();

    // ── キャラ選択 ──
    const charGrid = document.getElementById("char-grid");
    ROSTER.forEach(r => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "char-btn";
      btn.innerHTML = `<span class="emoji">${r.emoji}</span>${r.name}`;
      btn.onclick = () => startAs(r.id);
      charGrid.appendChild(btn);
    });

    function resetBattle() {
      gameResult = null;
      playerHits = 0;
      fallen.clear();
      projectiles.clear();
      hitCooldown.clear();
      document.getElementById("game-over").classList.remove("show", "lose");
      ROSTER.forEach(r => {
        hpMap[r.id] = r.hp || MAX_HP;
        botThrowReady.set(r.id, 0);
        const body = getFighterBody(r.id);
        if (body) {
          Body.setStatic(body, false);
          Body.setPosition(body, { x: r.x * W, y: r.y * H });
          Body.setVelocity(body, { x: 0, y: 0 });
          Body.setAngle(body, 0);
          body.plugin.ax = r.x * W;
          body.plugin.ay = r.y * H;
        }
      });
      Composite.allBodies(world).forEach(b => {
        if (b.label === "projectile") Composite.remove(world, b);
      });
      updateUI();
    }

    function startAs(id) {
      playerId = id;
      resetBattle();
      document.getElementById("char-select").classList.add("hidden");
      updateUI();
      ensureAudio();
      const p = ROSTER.find(r => r.id === id);
      const proj = p.role === "customer" ? "300円コイン" : "バーガー";
      showToast(`${p.emoji} ${p.name} — ${proj}で店員を倒せ！`);
      speak(p, "店員を倒して YOU WIN！がんばれ！");
      ROSTER.forEach(r => {
        if (r.id !== id) botThrowReady.set(r.id, Date.now() + 800 + Math.random() * 600);
      });
    }

    function endGame(result) {
      if (gameResult) return;
      gameResult = result;
      holdingFire = false;
      clearInterval(holdFireTimer);
      const overlay = document.getElementById("game-over");
      const title = document.getElementById("go-title");
      const msg = document.getElementById("go-msg");
      overlay.classList.add("show");
      if (result === "win") {
        title.textContent = "YOU WIN!";
        msg.textContent = "店員全員を倒した！エムドナルドの勝利！";
        overlay.classList.remove("lose");
        sfx("win");
      } else {
        title.textContent = "YOU LOSE";
        msg.textContent = "倒されてしまった…もう一度挑戦しよう！";
        overlay.classList.add("lose");
        sfx("lose");
      }
    }

    document.getElementById("btn-retry").onclick = () => {
      if (playerId) startAs(playerId);
    };

    document.getElementById("btn-change").onclick = () => {
      document.getElementById("char-select").classList.remove("hidden");
      document.getElementById("game-over").classList.remove("show", "lose");
      playerId = null;
      gameResult = null;
      resetBattle();
      updateUI();
    };

    // ── 音声 ──
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }
    function sfx(type) {
      if (!soundOn || !audioCtx) return;
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      if (type === "throw") {
        osc.type = "square";
        osc.frequency.setValueAtTime(200, t);
        osc.frequency.exponentialRampToValueAtTime(90, t + 0.1);
        gain.gain.setValueAtTime(0.12, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        osc.start(t); osc.stop(t + 0.1);
      } else if (type === "hit") {
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(100, t);
        osc.frequency.exponentialRampToValueAtTime(35, t + 0.18);
        gain.gain.setValueAtTime(0.18, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.18);
        osc.start(t); osc.stop(t + 0.18);
      } else if (type === "combo") {
        osc.type = "sine";
        osc.frequency.setValueAtTime(440, t);
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
        osc.start(t); osc.stop(t + 0.12);
      } else if (type === "win") {
        [523, 659, 784].forEach((f, i) => {
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g); g.connect(audioCtx.destination);
          o.type = "sine";
          o.frequency.setValueAtTime(f, t + i * 0.12);
          g.gain.setValueAtTime(0.15, t + i * 0.12);
          g.gain.exponentialRampToValueAtTime(0.01, t + i * 0.12 + 0.25);
          o.start(t + i * 0.12); o.stop(t + i * 0.12 + 0.25);
        });
      } else if (type === "lose") {
        osc.type = "triangle";
        osc.frequency.setValueAtTime(180, t);
        osc.frequency.exponentialRampToValueAtTime(60, t + 0.5);
        gain.gain.setValueAtTime(0.15, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
        osc.start(t); osc.stop(t + 0.5);
      } else if (type === "coin") {
        osc.type = "sine";
        osc.frequency.setValueAtTime(880, t);
        gain.gain.setValueAtTime(0.08, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.06);
        osc.start(t); osc.stop(t + 0.06);
      }
    }
    function speak(fighter, line) {
      if (!soundOn || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(line);
      u.lang = "ja-JP";
      u.pitch = fighter.voice.pitch;
      u.rate = fighter.voice.rate;
      bubble.textContent = `${fighter.name}: ${line}`;
      bubble.classList.add("show");
      clearTimeout(bubble._t);
      bubble._t = setTimeout(() => bubble.classList.remove("show"), 2200);
      window.speechSynthesis.speak(u);
    }
    function randomLine(f, kind) {
      const arr = f.lines[kind];
      return arr[Math.floor(Math.random() * arr.length)];
    }
    document.getElementById("btn-sound").onclick = function () {
      ensureAudio();
      soundOn = !soundOn;
      this.textContent = soundOn ? "🔊 音声 ON" : "🔇 音声 OFF";
      this.classList.toggle("off", !soundOn);
    };
    function showToast(msg) {
      const t = document.createElement("div");
      t.className = "toast";
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }
    function showFx(x, y, text, color = MC.yellow) {
      const el = document.createElement("div");
      el.className = "fx";
      el.textContent = text;
      el.style.color = color;
      el.style.left = (x / W * wrap.clientWidth) + "px";
      el.style.top = (y / H * wrap.clientHeight) + "px";
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 700);
    }

    // ── Matter.js ──
    const engine = Engine.create({ gravity: { x: 0, y: 0.22 } });
    const world = engine.world;
    const render = Render.create({
      canvas, engine,
      options: { width: W, height: H, wireframes: false, background: MC.cream },
    });

    function drawGoldenArches(ctx, cx, cy, size) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.strokeStyle = MC.yellow;
      ctx.lineWidth = size * 0.2;
      ctx.lineCap = "round";
      const r = size * 0.38;
      ctx.beginPath(); ctx.arc(-r * 0.52, r * 0.35, r, Math.PI, 0); ctx.stroke();
      ctx.beginPath(); ctx.arc(r * 0.52, r * 0.35, r, Math.PI, 0); ctx.stroke();
      ctx.restore();
    }

    function projectileTypeFor(role) {
      if (role === "customer") return "coin";
      if (role === "courier") return "bag";
      return "burger";
    }

    function drawStore(ctx) {
      ctx.fillStyle = MC.cream;
      ctx.fillRect(0, 0, W, H);
      // 赤い腰壁（典型的なファストフード店内）
      ctx.fillStyle = MC.red;
      ctx.fillRect(0, 80, W, H - 80);
      // 白い天井
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, W, 80);
      for (let i = 0; i < 7; i++) {
        const lx = 70 + i * 130;
        ctx.fillStyle = "rgba(255,199,44,0.35)";
        ctx.beginPath(); ctx.ellipse(lx, 50, 40, 14, 0, 0, Math.PI * 2); ctx.fill();
      }
      // 床タイル
      const tile = 32;
      for (let y = H - 180; y < H; y += tile) {
        for (let x = 0; x < W; x += tile) {
          ctx.fillStyle = ((x / tile | 0) + (y / tile | 0)) % 2 ? MC.cream : "#E8D5C4";
          ctx.fillRect(x, y, tile, tile);
        }
      }
      // 壁のゴールデンアーチ看板
      ctx.fillStyle = MC.red;
      ctx.strokeStyle = MC.yellow;
      ctx.lineWidth = 4;
      ctx.fillRect(W/2 - 110, 88, 220, 72);
      ctx.strokeRect(W/2 - 110, 88, 220, 72);
      drawGoldenArches(ctx, W/2, 118, 55);
      ctx.fillStyle = MC.yellow;
      ctx.font = "bold 14px 'Noto Sans JP'";
      ctx.textAlign = "center";
      ctx.fillText("エムドナルド", W/2, 148);
      // メニューボード
      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect(40, 100, 140, 90);
      ctx.fillRect(W - 180, 100, 140, 90);
      ctx.fillStyle = MC.yellow;
      ctx.font = "bold 11px 'Noto Sans JP'";
      ctx.fillText("🍔 SET", 110, 130);
      ctx.fillText("¥680", 110, 150);
      ctx.fillText("🍟 DRINK", W - 110, 130);
      ctx.fillText("¥300", W - 110, 150);
      // ドリンクマシン
      ctx.fillStyle = "#ddd";
      ctx.fillRect(24, COUNTER_Y - 80, 50, 70);
      ctx.fillStyle = MC.red;
      ctx.fillRect(30, COUNTER_Y - 75, 38, 12);
      // ★ レジカウンター（黒一長）
      const cw = W * 0.78, ch = 18, cy = COUNTER_Y;
      ctx.fillStyle = "#111";
      ctx.fillRect((W - cw) / 2, cy - ch / 2, cw, ch);
      ctx.fillStyle = "#2a2a2a";
      ctx.fillRect((W - cw) / 2, cy - ch / 2 - 6, cw, 6);
      ctx.strokeStyle = MC.brown;
      ctx.lineWidth = 2;
      ctx.strokeRect((W - cw) / 2, cy - ch / 2 - 6, cw, ch + 6);
      // レジ
      ctx.fillStyle = "#333";
      ctx.fillRect(W/2 - 28, cy - 28, 56, 22);
      ctx.fillStyle = MC.yellow;
      ctx.font = "9px 'Noto Sans JP'";
      ctx.fillText("REGISTER", W/2, cy - 14);
      ctx.fillStyle = "#888";
      ctx.fillText("━━ カウンター ━━", W/2, cy + 5);
      // 客席エリアの線
      ctx.strokeStyle = "rgba(255,199,44,0.4)";
      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      ctx.moveTo(40, CUSTOMER_Y - 20);
      ctx.lineTo(W - 40, CUSTOMER_Y - 20);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.font = "10px 'Noto Sans JP'";
      ctx.fillText("← 客席エリア", 90, CUSTOMER_Y - 28);
      ctx.fillText("店員エリア →", W - 90, CLERK_Y + 50);
    }

    Events.on(render, "beforeRender", () => drawStore(render.context));

    Composite.add(world, [
      Bodies.rectangle(W/2, -20, W, 40, { isStatic: true, render: { visible: false } }),
      Bodies.rectangle(W/2, H + 20, W, 40, { isStatic: true, render: { visible: false } }),
      Bodies.rectangle(-20, H/2, 40, H, { isStatic: true, render: { visible: false } }),
      Bodies.rectangle(W + 20, H/2, 40, H, { isStatic: true, render: { visible: false } }),
      Bodies.rectangle(W/2, COUNTER_Y, W * 0.78, 18, { isStatic: true, render: { visible: false } }),
    ]);

    const fighters = ROSTER.map(r => {
      const body = Bodies.circle(r.x * W, r.y * H, 36, {
        label: "fighter",
        restitution: 0.55,
        frictionAir: 0.12,
        render: { visible: false },
        plugin: { ...r, ax: r.x * W, ay: r.y * H },
      });
      return body;
    });
    Composite.add(world, fighters);

    function getFighterBody(id) {
      return fighters.find(f => f.plugin.id === id);
    }

    function spawnProjectile(shooterBody, tx, ty, opts = {}) {
      if (gameResult || fallen.has(shooterBody.plugin.id)) return;
      const shooter = shooterBody.plugin;
      const from = shooterBody.position;
      const dir = Vector.normalise(Vector.sub({ x: tx, y: ty }, from));
      const ptype = projectileTypeFor(shooter.role);
      const speed = ptype === "coin" ? 24 : opts.fast ? 22 : 20;
      const radius = ptype === "coin" ? 12 : 14;
      const proj = Bodies.circle(from.x, from.y - 28, radius, {
        label: "projectile",
        restitution: 0.92,
        frictionAir: 0.008,
        render: { visible: false },
        plugin: {
          shooterId: shooter.id,
          ptype,
          fromBot: shooter.id !== playerId,
        },
      });
      Body.setVelocity(proj, { x: dir.x * speed, y: dir.y * speed });
      Body.setAngularVelocity(proj, (Math.random() - 0.5) * 0.35);
      Composite.add(world, proj);
      projectiles.add(proj);
      if (shooter.id === playerId || !opts.quiet) {
        sfx(ptype === "coin" ? "coin" : "throw");
      }
      if (shooter.id === playerId) speak(shooter, randomLine(shooter, "throw"));
      const fxText = ptype === "coin" ? "300円！" : shooter.id === playerId ? "バンッ！" : "🤖";
      showFx(from.x, from.y, fxText, ptype === "coin" ? "#f1c40f" : ptype === "bag" ? "#06C167" : MC.yellow);
      setTimeout(() => {
        if (projectiles.has(proj)) { Composite.remove(world, proj); projectiles.delete(proj); }
      }, 3200);
    }

    function playerThrow(tx, ty) {
      if (!playerId || !playerThrowReady || gameResult) return;
      const player = getFighterBody(playerId);
      if (!player || fallen.has(playerId)) return;
      playerThrowReady = false;
      spawnProjectile(player, tx, ty, { fast: holdingFire });
      setTimeout(() => { playerThrowReady = true; }, holdingFire ? 100 : 180);
    }

    function pickBotTarget(shooterBody) {
      const player = getFighterBody(playerId);
      if (player && !fallen.has(playerId) && Math.random() < 0.75) return player;
      const others = fighters.filter(f =>
        f.plugin.id !== shooterBody.plugin.id && !fallen.has(f.plugin.id)
      );
      if (!others.length) return null;
      return others[Math.floor(Math.random() * others.length)];
    }

    function runBotAI() {
      if (!playerId || gameResult) return;
      const now = Date.now();
      for (const bot of fighters.filter(f => f.plugin.id !== playerId && !fallen.has(f.plugin.id))) {
        const id = bot.plugin.id;
        const next = botThrowReady.get(id) || 0;
        if (now < next) continue;
        const target = pickBotTarget(bot);
        if (!target) continue;
        const spread = target.plugin.id === playerId ? 22 : 40;
        spawnProjectile(
          bot,
          target.position.x + (Math.random() - 0.5) * spread,
          target.position.y + (Math.random() - 0.5) * spread,
          { quiet: true }
        );
        const isClerk = bot.plugin.isClerk;
        botThrowReady.set(id, now + (isClerk ? 600 : 900) + Math.random() * (isClerk ? 700 : 900));
      }
    }

    function enemyClerks() {
      return CLERK_IDS.filter(id => id !== playerId);
    }

    function checkWin() {
      if (enemyClerks().every(id => fallen.has(id))) {
        setTimeout(() => endGame("win"), 800);
      }
    }

    function knockDown(victimBody) {
      const id = victimBody.plugin.id;
      if (fallen.has(id)) return;
      fallen.add(id);
      speak(victimBody.plugin, randomLine(victimBody.plugin, "fall"));
      Body.setVelocity(victimBody, {
        x: (Math.random() - 0.5) * 6,
        y: 5 + Math.random() * 3,
      });
      Body.setAngularVelocity(victimBody, (Math.random() - 0.5) * 0.4);
      showFx(victimBody.position.x, victimBody.position.y, "倒れた！", "#e74c3c");
      updateUI();
      if (id === playerId) {
        setTimeout(() => endGame("lose"), 600);
        return;
      }
      checkWin();
    }

    Events.on(engine, "collisionStart", ({ pairs }) => {
      for (const { bodyA: a, bodyB: b } of pairs) {
        const proj = [a, b].find(x => x.label === "projectile");
        const victim = [a, b].find(x => x.label === "fighter");
        if (!proj || !victim) continue;
        if (proj.plugin.shooterId === victim.plugin.id) continue;
        if (fallen.has(victim.plugin.id)) continue;
        const key = proj.id + "-" + victim.id;
        if (hitCooldown.has(key)) continue;
        hitCooldown.set(key, true);
        setTimeout(() => hitCooldown.delete(key), 180);

        const dmg = DAMAGE[proj.plugin.ptype] || 12;
        hpMap[victim.plugin.id] -= dmg;

        if (proj.plugin.shooterId === playerId) {
          playerHits++;
          if (victim.plugin.isClerk) {
            showFx(victim.position.x, victim.position.y - 30, `-${dmg}`, MC.yellow);
          }
        }
        if (victim.plugin.id === playerId) {
          showToast(`🤖 ${ROSTER.find(r => r.id === proj.plugin.shooterId)?.name || "店員"}の攻撃！ -${dmg}`);
        }
        habit.total++;
        habit.todayHits++;
        saveHabit();

        const dir = Vector.normalise(Vector.sub(victim.position, proj.position));
        Body.applyForce(victim, victim.position, { x: dir.x * 0.16, y: dir.y * 0.16 });
        sfx("hit");
        if (victim.plugin.id === playerId || proj.plugin.shooterId === playerId) {
          speak(victim.plugin, randomLine(victim.plugin, "hit"));
        }
        showFx(
          (proj.position.x + victim.position.x) / 2,
          (proj.position.y + victim.position.y) / 2,
          "直撃!",
          "#FF6B9D"
        );
        Composite.remove(world, proj);
        projectiles.delete(proj);
        updateUI();

        if (hpMap[victim.plugin.id] <= 0) {
          knockDown(victim);
        }
      }
    });

    function canvasCoords(e) {
      const r = canvas.getBoundingClientRect();
      return {
        x: ((e.clientX - r.left) / r.width) * W,
        y: ((e.clientY - r.top) / r.height) * H,
      };
    }

    function startHold(e) {
      if (!playerId || gameResult || e.target.closest("#char-select")) return;
      e.preventDefault();
      ensureAudio();
      holdingFire = true;
      const { x, y } = canvasCoords(e);
      lastAim = { x, y };
      playerThrow(x, y);
      clearInterval(holdFireTimer);
      holdFireTimer = setInterval(() => playerThrow(lastAim.x, lastAim.y), 120);
    }

    wrap.addEventListener("mousedown", startHold);
    wrap.addEventListener("touchstart", startHold, { passive: false });

    wrap.addEventListener("mousemove", e => {
      if (!holdingFire) return;
      lastAim = canvasCoords(e);
    });
    wrap.addEventListener("touchmove", e => {
      if (!holdingFire || !e.touches[0]) return;
      lastAim = canvasCoords(e.touches[0]);
    }, { passive: true });

    const stopHold = () => {
      holdingFire = false;
      clearInterval(holdFireTimer);
    };
    wrap.addEventListener("mouseup", stopHold);
    wrap.addEventListener("mouseleave", stopHold);
    wrap.addEventListener("touchend", stopHold);
    wrap.addEventListener("touchcancel", stopHold);

    // ── 描画 ──
    function skinGrad(ctx, y) {
      const g = ctx.createRadialGradient(0, y, 2, 0, y, 20);
      g.addColorStop(0, "#ffe0bd");
      g.addColorStop(1, "#d4a574");
      return g;
    }

    function drawUniform(ctx, label) {
      ctx.fillStyle = MC.red;
      ctx.fillRect(-22, 12, 44, 38);
      ctx.fillStyle = MC.yellow;
      ctx.fillRect(-18, 16, 36, 12);
      ctx.fillStyle = MC.red;
      ctx.font = "bold 10px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(label || "M", 0, 26);
      ctx.fillStyle = MC.red;
      ctx.fillRect(-14, -28, 28, 10);
    }

    function drawCuteClerk(ctx) {
      drawUniform(ctx, "M");
      ctx.fillStyle = "#2d3436";
      ctx.beginPath();
      ctx.moveTo(-18, 50); ctx.lineTo(-22, 66); ctx.lineTo(22, 66); ctx.lineTo(18, 50);
      ctx.fill();
      ctx.fillStyle = "#111";
      ctx.fillRect(-12, 66, 9, 14); ctx.fillRect(3, 66, 9, 14);
      ctx.fillStyle = skinGrad(ctx, -8);
      ctx.beginPath(); ctx.ellipse(0, -6, 19, 21, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#4a2c2a";
      ctx.beginPath(); ctx.ellipse(0, -12, 21, 18, 0, Math.PI, 0); ctx.fill();
      ctx.fillRect(-20, -12, 9, 32); ctx.fillRect(11, -12, 9, 32);
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.ellipse(-7, -8, 6, 7, 0, 0, Math.PI * 2); ctx.ellipse(7, -8, 6, 7, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#3d2314";
      ctx.beginPath(); ctx.ellipse(-7, -7, 3, 4, 0, 0, Math.PI * 2); ctx.ellipse(7, -7, 3, 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "rgba(255,120,120,0.5)";
      ctx.beginPath(); ctx.ellipse(-12, 0, 4, 2.5, 0, 0, Math.PI * 2); ctx.ellipse(12, 0, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();

    function drawMaleClerk(ctx) {

    }

    function drawCharacter(ctx, role, variant) {
      if (role === "cute-clerk") drawCuteClerk(ctx);
      else if (role === "messy-clerk") drawMessyClerk(ctx);
      else if (role === "handsome") drawHandsome(ctx);
      else if (role === "courier") drawCourier(ctx, variant ?? 0);
      else drawCustomer(ctx);
    }

    function drawHpBar(ctx, x, y, hp, maxHp) {
      const w = 44, h = 5;
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(x - w/2, y, w, h);
      const ratio = Math.max(0, hp / maxHp);
      ctx.fillStyle = ratio > 0.4 ? "#2ecc71" : ratio > 0.2 ? "#f39c12" : "#e74c3c";
      ctx.fillRect(x - w/2, y, w * ratio, h);
    }

    Events.on(render, "afterRender", () => {
      const ctx = render.context;
      for (const f of fighters) {
        const { role, name, variant, id, isClerk } = f.plugin;
        const isPlayer = id === playerId;
        const isDown = fallen.has(id);
        ctx.save();
        ctx.translate(f.position.x, f.position.y);
        ctx.rotate(f.angle);
        if (isDown) ctx.globalAlpha = 0.55;
        drawCharacter(ctx, role, variant);
        ctx.restore();
        ctx.font = "bold 11px 'Noto Sans JP'";
        ctx.textAlign = "center";
        ctx.strokeStyle = MC.brown;
        ctx.lineWidth = 3;
        const tag = (isPlayer ? "★ " : isDown ? "💫 " : "🤖 ") + name;
        ctx.strokeText(tag, f.position.x, f.position.y - 52);
        ctx.fillStyle = isPlayer ? MC.yellow : isDown ? "#999" : "#ccc";
        ctx.fillText(tag, f.position.x, f.position.y - 52);
        if (!isPlayer && !isDown) {
          ctx.font = "9px sans-serif";
          ctx.fillStyle = "rgba(100,100,100,0.8)";
          ctx.fillText(isClerk ? "店員" : role === "customer" ? "300円投げ" : "配達", f.position.x, f.position.y - 40);
        }
        if (!isDown) {
          const maxHp = ROSTER.find(r => r.id === id)?.hp || MAX_HP;
          drawHpBar(ctx, f.position.x, f.position.y - 58, hpMap[id], maxHp);
        }
      }
      for (const p of projectiles) {
        ctx.save();
        ctx.translate(p.position.x, p.position.y);
        ctx.rotate(p.angle);
        if (p.plugin.ptype === "coin") drawCoin(ctx);
        else drawBurger(ctx, p.plugin.ptype);
        ctx.restore();
      }
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);

    setInterval(() => {
      for (const f of fighters) {
        if (fallen.has(f.plugin.id)) {
          Body.setVelocity(f, { x: f.velocity.x * 0.95, y: f.velocity.y * 0.95 });
          continue;
        }
        Body.applyForce(f, f.position, {
          x: (f.plugin.ax - f.position.x) * 0.00006,
          y: (f.plugin.ay - f.position.y) * 0.00006,
        });
        Body.setVelocity(f, { x: f.velocity.x * 0.92, y: f.velocity.y * 0.92 });
      }
    }, 50);

    setInterval(runBotAI, 350);

    setInterval(() => {
      if (!playerId || gameResult || Math.random() > 0.22) return;
      const bots = ROSTER.filter(r => r.id !== playerId && !fallen.has(r.id));
      if (!bots.length) return;
      const f = bots[Math.floor(Math.random() * bots.length)];
      speak(f, randomLine(f, "idle"));
    }, 5000);
  </script>
</body>
</html>
